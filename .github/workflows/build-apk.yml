            <div id="viewDiv"></div>

            <div class="topbar">
              <div class="title">
                <b>Skötselytor GPS</b>
                <span>GPS, bakgrundsspårning, status och nålar</span>
              </div>
              <button class="btn" id="pinBtn">Nål</button>
              <button class="btn" id="pinCenterTopBtn">Mitt</button>
              <button class="btn" id="pinGpsBtn">Nål här</button>
              <button class="btn" id="trackBtn">Spåra</button>
              <button class="gps" id="gpsBtn">GPS</button>
            </div>

            <div class="hint" id="pinHint">Nålläget aktivt – tryck på kartan, använd Mitt eller Nål här</div>
