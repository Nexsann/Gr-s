name: Build Skötselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create Android project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/gps
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SkotselytorGPS"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "se.skotselytor.gps"
              compileSdk 35

              defaultConfig {
                  applicationId "se.skotselytor.gps"
                  minSdk 26
                  targetSdk 35
                  versionCode 14
                  versionName "2.3"
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#22c55e</item>
                  <item name="android:navigationBarColor">#020617</item>
                  <item name="android:statusBarColor">#020617</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor GPS"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".BackgroundLocationService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/gps/BackgroundLocationService.java <<'EOF'
          package se.skotselytor.gps;

          import android.Manifest;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.IBinder;
          import android.os.PowerManager;

          import org.json.JSONArray;
          import org.json.JSONObject;

          public class BackgroundLocationService extends Service implements LocationListener {
              public static final String ACTION_START = "se.skotselytor.gps.START_TRACKING";
              public static final String ACTION_STOP = "se.skotselytor.gps.STOP_TRACKING";

              private static final String CHANNEL_ID = "skotselytor_gps_tracking";
              private static final int NOTIFICATION_ID = 2303;
              private static final String PREFS = "skotselytor_native";
              private static final String TRACK_KEY = "native_track";

              private static final float MIN_DISTANCE_METERS = 3f;
              private static final long MIN_TIME_MS = 3000L;
              private static final float GOOD_ACCURACY = 35f;
              private static final float BAD_ACCURACY = 90f;
              private static final float IMPOSSIBLE_JUMP_METERS = 90f;

              private LocationManager locationManager;
              private Location lastSavedLocation;
              private PowerManager.WakeLock wakeLock;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  locationManager = (LocationManager) getSystemService(Context.LOCATION_SERVICE);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && ACTION_STOP.equals(intent.getAction())) {
                      stopTracking();
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  startForeground(NOTIFICATION_ID, buildNotification("Spårar även när appen är i bakgrunden"));
                  acquireWakeLock();
                  startTracking();
                  return START_STICKY;
              }

              private void acquireWakeLock() {
                  try {
                      PowerManager pm = (PowerManager) getSystemService(Context.POWER_SERVICE);
                      if (pm != null && wakeLock == null) {
                          wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "SkotselytorGPS:TrackingLock");
                          wakeLock.setReferenceCounted(false);
                          wakeLock.acquire();
                      }
                  } catch (Exception ignored) {}
              }

              private void releaseWakeLock() {
                  try {
                      if (wakeLock != null && wakeLock.isHeld()) {
                          wakeLock.release();
                      }
                  } catch (Exception ignored) {}
                  wakeLock = null;
              }

              private void startTracking() {
                  if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED &&
                      checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                      stopSelf();
                      return;
                  }

                  try {
                      locationManager.requestLocationUpdates(
                          LocationManager.GPS_PROVIDER,
                          MIN_TIME_MS,
                          MIN_DISTANCE_METERS,
                          this
                      );
                  } catch (Exception ignored) {}

                  try {
                      locationManager.requestLocationUpdates(
                          LocationManager.NETWORK_PROVIDER,
                          MIN_TIME_MS,
                          MIN_DISTANCE_METERS,
                          this
                      );
                  } catch (Exception ignored) {}
              }

              private void stopTracking() {
                  try {
                      if (locationManager != null) {
                          locationManager.removeUpdates(this);
                      }
                  } catch (Exception ignored) {}

                  releaseWakeLock();

                  try {
                      stopForeground(true);
                  } catch (Exception ignored) {}
              }

              @Override
              public void onLocationChanged(Location location) {
                  if (location == null) return;

                  float acc = location.hasAccuracy() ? location.getAccuracy() : 999f;

                  if (acc > BAD_ACCURACY) return;

                  if (lastSavedLocation != null) {
                      float d = lastSavedLocation.distanceTo(location);

                      if (d > IMPOSSIBLE_JUMP_METERS && acc > 20f) return;
                      if (d < MIN_DISTANCE_METERS) return;
                  }

                  if (acc > GOOD_ACCURACY) return;

                  saveLocation(location);
                  lastSavedLocation = location;
              }

              private void saveLocation(Location loc) {
                  try {
                      SharedPreferences prefs = getSharedPreferences(PREFS, MODE_PRIVATE);
                      String old = prefs.getString(TRACK_KEY, "[]");
                      JSONArray arr = new JSONArray(old);

                      JSONObject o = new JSONObject();
                      o.put("lat", loc.getLatitude());
                      o.put("lon", loc.getLongitude());
                      o.put("accuracy", Math.round(loc.hasAccuracy() ? loc.getAccuracy() : 0));
                      o.put("heading", loc.hasBearing() ? loc.getBearing() : JSONObject.NULL);
                      o.put("time", System.currentTimeMillis());
                      o.put("native", true);

                      arr.put(o);

                      while (arr.length() > 20000) {
                          arr.remove(0);
                      }

                      prefs.edit().putString(TRACK_KEY, arr.toString()).apply();
                  } catch (Exception ignored) {}
              }

              private Notification buildNotification(String text) {
                  Notification.Builder b;

                  if (Build.VERSION.SDK_INT >= 26) {
                      b = new Notification.Builder(this, CHANNEL_ID);
                  } else {
                      b = new Notification.Builder(this);
                  }

                  return b
                      .setContentTitle("Skötselytor GPS")
                      .setContentText(text)
                      .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                      .setOngoing(true)
                      .setShowWhen(false)
                      .build();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "GPS-spårning",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      channel.setDescription("Aktiv när appen spårar i bakgrunden.");

                      NotificationManager nm = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                      if (nm != null) nm.createNotificationChannel(channel);
                  }
              }

              @Override public void onStatusChanged(String provider, int status, Bundle extras) {}
              @Override public void onProviderEnabled(String provider) {}
              @Override public void onProviderDisabled(String provider) {}

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              @Override
              public void onDestroy() {
                  stopTracking();
                  super.onDestroy();
              }
          }
          EOF

          cat > app/src/main/java/se/skotselytor/gps/MainActivity.java <<'EOF'
          package se.skotselytor.gps;

          import android.Manifest;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import android.view.WindowManager;
          import android.webkit.GeolocationPermissions;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private static final int LOCATION_REQUEST = 1001;
              private static final int NOTIFICATION_REQUEST = 1002;

              private WebView webView;
              private GeolocationPermissions.Callback geoCallback;
              private String geoOrigin;

              @SuppressLint({"SetJavaScriptEnabled", "JavascriptInterface"})
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  hideSystemUI();

                  requestNeededPermissions();

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setGeolocationEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.addJavascriptInterface(new AndroidBridge(), "AndroidBridge");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          injectNativeTrack();
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          geoOrigin = origin;
                          geoCallback = callback;

                          boolean granted =
                              checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED ||
                              checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;

                          if (granted) {
                              callback.invoke(origin, true, false);
                          } else {
                              requestPermissions(new String[] {
                                  Manifest.permission.ACCESS_FINE_LOCATION,
                                  Manifest.permission.ACCESS_COARSE_LOCATION
                              }, LOCATION_REQUEST);
                          }
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              private void hideSystemUI() {
                  if (Build.VERSION.SDK_INT >= 30) {
                      getWindow().setDecorFitsSystemWindows(false);
                      WindowInsetsController controller = getWindow().getInsetsController();
                      if (controller != null) {
                          controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          controller.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  } else {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                              | View.SYSTEM_UI_FLAG_FULLSCREEN
                              | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                              | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      );
                  }
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) hideSystemUI();
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  hideSystemUI();
                  injectNativeTrack();
              }

              private void requestNeededPermissions() {
                  if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[] {
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION
                          }, LOCATION_REQUEST);
                      }
                  }

                  if (Build.VERSION.SDK_INT >= 33) {
                      if (checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[] {
                              Manifest.permission.POST_NOTIFICATIONS
                          }, NOTIFICATION_REQUEST);
                      }
                  }
              }

              private void injectNativeTrack() {
                  try {
                      if (webView == null) return;

                      SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                      String nativeTrack = prefs.getString("native_track", "[]");
                      String escaped = nativeTrack
                          .replace("\\", "\\\\")
                          .replace("'", "\\'")
                          .replace("\n", "");

                      String js =
                          "try {" +
                          "  window.mergeNativeTrack && window.mergeNativeTrack('" + escaped + "');" +
                          "} catch(e) { console.log(e); }";

                      if (Build.VERSION.SDK_INT >= 19) {
                          webView.evaluateJavascript(js, null);
                      } else {
                          webView.loadUrl("javascript:" + js);
                      }
                  } catch (Exception ignored) {}
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);

                  if (requestCode == LOCATION_REQUEST) {
                      boolean granted = false;
                      for (int result : grantResults) {
                          if (result == PackageManager.PERMISSION_GRANTED) {
                              granted = true;
                              break;
                          }
                      }

                      if (geoCallback != null && geoOrigin != null) {
                          geoCallback.invoke(geoOrigin, granted, false);
                          geoCallback = null;
                          geoOrigin = null;
                      }
                  }
              }

              public class AndroidBridge {
                  @JavascriptInterface
                  public void startBackgroundTracking() {
                      Intent i = new Intent(MainActivity.this, BackgroundLocationService.class);
                      i.setAction(BackgroundLocationService.ACTION_START);

                      if (Build.VERSION.SDK_INT >= 26) {
                          startForegroundService(i);
                      } else {
                          startService(i);
                      }
                  }

                  @JavascriptInterface
                  public void stopBackgroundTracking() {
                      Intent i = new Intent(MainActivity.this, BackgroundLocationService.class);
                      i.setAction(BackgroundLocationService.ACTION_STOP);
                      startService(i);
                  }

                  @JavascriptInterface
                  public String getNativeTrack() {
                      SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                      return prefs.getString("native_track", "[]");
                  }

                  @JavascriptInterface
                  public void clearNativeTrack() {
                      SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                      prefs.edit().putString("native_track", "[]").apply();
                  }

                  @JavascriptInterface
                  public void shareText(String subject, String text) {
                      Intent sendIntent = new Intent();
                      sendIntent.setAction(Intent.ACTION_SEND);
                      sendIntent.putExtra(Intent.EXTRA_SUBJECT, subject);
                      sendIntent.putExtra(Intent.EXTRA_TEXT, text);
                      sendIntent.setType("text/plain");
                      startActivity(Intent.createChooser(sendIntent, "Dela rapport"));
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

