name: Build Skötselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create absolute minimal Android project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/starttest
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "SkotselytorStartTest"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "se.skotselytor.starttest"
              compileSdk 35

              defaultConfig {
                  applicationId "se.skotselytor.starttest"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "0.1-starttest"
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#22c55e</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor Starttest"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/starttest/MainActivity.java <<'EOF'
          package se.skotselytor.starttest;

          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(40, 40, 40, 40);
                  root.setBackgroundColor(Color.rgb(2, 6, 23));

                  TextView title = new TextView(this);
                  title.setText("Skötselytor Starttest");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(26);
                  title.setGravity(Gravity.CENTER);
                  title.setTypeface(null, 1);

                  TextView text = new TextView(this);
                  text.setText("Om du ser detta fungerar appstarten.\n\nNästa steg är att lägga tillbaka WebView/karta.");
                  text.setTextColor(Color.rgb(203, 213, 225));
                  text.setTextSize(16);
                  text.setGravity(Gravity.CENTER);
                  text.setPadding(0, 24, 0, 0);

                  root.addView(title);
                  root.addView(text);

                  setContentView(root);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-starttest-apk
          path: app/build/outputs/apk/debug/app-debug.apk
