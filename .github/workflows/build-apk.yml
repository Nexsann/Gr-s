                margin-top:10px;
                background:#082e5c;
                color:white;
                border-radius:14px;
              }

              .delete {
                width:100%;
                margin-top:8px;
                background:#fee2e2;
                color:#7f1d1d;
                border-radius:14px;
              }

              .mini {
                background:#e2e8f0;
                color:#0f172a;
                border-radius:14px;
                width:100%;
                margin-top:8px;
              }

              .hidden { display:none !important; }

              .toast {
                position:fixed;
                left:50%;
                bottom:calc(72px + env(safe-area-inset-bottom));
                transform:translateX(-50%);
                z-index:1500;
                background:#020617;
                color:white;
                border-radius:999px;
                padding:11px 16px;
                font-weight:900;
                opacity:0;
                transition:.2s;
                white-space:nowrap;
                box-shadow:0 12px 28px rgba(0,0,0,.3);
              }

              .toast.show { opacity:1; }

              .hint {
                position:fixed;
                left:50%;
                top:calc(128px + env(safe-area-inset-top));
                transform:translateX(-50%);
                z-index:1300;
                background:#ef4444;
                color:white;
                border-radius:999px;
                padding:10px 14px;
                font-size:13px;
                font-weight:900;
                box-shadow:0 10px 25px rgba(0,0,0,.25);
                display:none;
                white-space:nowrap;
              }

              .hint.show { display:block; }

              .list {
                display:grid;
                gap:8px;
                margin-top:10px;
              }

              .listItem {
                background:#f8fafc;
                border:1px solid #e2e8f0;
                border-radius:14px;
                padding:10px;
              }

              .listItem b { display:block; font-size:13px; }
              .listItem span { display:block; font-size:12px; color:#64748b; margin-top:3px; }

              .gpsArrow {
                width:0;
                height:0;
                border-left:11px solid transparent;
                border-right:11px solid transparent;
                border-bottom:26px solid #0ea5e9;
                filter:drop-shadow(0 2px 4px rgba(0,0,0,.45));
                transform-origin:50% 70%;
              }

              .pinIcon {
                width:34px;
                height:34px;
                border-radius:999px;
                border:4px solid white;
                display:flex;
                align-items:center;
                justify-content:center;
                color:white;
                font-weight:1000;
                box-shadow:0 5px 14px rgba(0,0,0,.35);
              }

              .leaflet-control-attribution {
                font-size:9px;
              }
            </style>
          </head>

          <body>
            <div id="map"></div>

            <div class="topbar">
              <div class="title">
                <b>Skötselytor GPS</b>
                <span id="dataInfo">Läser offline-data...</span>
              </div>
              <button class="btn" id="pinBtn">Nål</button>
              <button class="btn" id="trackBtn">Spåra</button>
              <button class="primary" id="gpsBtn">GPS</button>
            </div>

            <div class="stats">
              <div class="stat"><b>GPS</b><span id="gpsInfo">Ej aktiv</span></div>
              <div class="stat"><b>Idag</b><span id="todayKm">0,00 km</span></div>
              <div class="stat"><b>Punkter</b><span id="pointCount">0</span></div>
            </div>

            <div class="hint" id="pinHint">Tryck på kartan där nålen ska hamna</div>

            <div class="bottomBar">
              <button id="menuBtn">Meny</button>
              <button id="pinGpsBtn">Nål här</button>
              <button id="reportBtn">Rapport</button>
            </div>

            <div class="panel" id="areaPanel">
              <div class="panelHead">
                <div>
                  <h2 id="areaTitle">Vald yta</h2>
                  <small>Offline-laddad skötselyta</small>
                </div>
                <button id="closeArea">×</button>
              </div>

              <div class="panelBody">
                <div class="meta">
                  <div><b>ID</b><span id="mId">-</span></div>
                  <div><b>Typ</b><span id="mType">-</span></div>
                  <div><b>Subtyp</b><span id="mSubType">-</span></div>
                  <div><b>Team</b><span id="mTeam">-</span></div>
                  <div><b>Distrikt</b><span id="mDistrict">-</span></div>
                  <div><b>Area</b><span id="mArea">-</span></div>
                </div>

                <input id="worker" placeholder="Ditt namn">

                <div class="statuses">
                  <button data-status="Ej klippt">Ej klippt</button>
                  <button data-status="Pågår">Pågår</button>
                  <button data-status="Klippt">Klippt</button>
                  <button data-status="Problem">Problem</button>
                </div>

                <textarea id="comment" rows="3" placeholder="Kommentar"></textarea>
                <button class="save" id="saveAreaBtn">Spara status</button>
              </div>
            </div>

            <div class="panel" id="pinPanel">
              <div class="panelHead">
                <div>
                  <h2 id="pinTitle">Egen nål</h2>
                  <small id="pinSub">Kommentar/avvikelse på kartan</small>
                </div>
                <button id="closePin">×</button>
              </div>

              <div class="panelBody">
                <div class="meta">
                  <div><b>Lon/X</b><span id="pinX">-</span></div>
                  <div><b>Lat/Y</b><span id="pinY">-</span></div>
                </div>

                <select id="pinType">
                  <option value="Handjagare krävs">Handjagare krävs</option>
                  <option value="Hinder">Hinder</option>
                  <option value="Går ej klippa">Går ej klippa</option>
                  <option value="Behöver kollas">Behöver kollas</option>
                  <option value="Annat">Annat</option>
                </select>

                <textarea id="pinComment" rows="4" placeholder="Kommentar, t.ex. handjagare krävs runt stolpar"></textarea>

                <select id="pinStatus">
                  <option value="Öppen">Öppen</option>
                  <option value="Fixad">Fixad</option>
                </select>

                <button class="mini" id="movePinGpsBtn">Flytta till GPS</button>
                <button class="save" id="savePinBtn">Spara nål</button>
                <button class="delete hidden" id="deletePinBtn">Ta bort nål</button>
              </div>
            </div>

            <div class="panel" id="menuPanel">
              <div class="panelHead">
                <div>
                  <h2>Meny</h2>
                  <small>Statistik, rutter och rapport</small>
                </div>
                <button id="closeMenu">×</button>
              </div>

              <div class="panelBody">
                <div class="meta">
                  <div><b>Idag</b><span id="menuTodayKm">0,00 km</span></div>
                  <div><b>Tid</b><span id="menuTodayTime">0 min</span></div>
                  <div><b>Nålar</b><span id="menuPins">0</span></div>
                  <div><b>Statusar</b><span id="menuStatuses">0</span></div>
                </div>

                <button class="save" id="shareReportBtn">Dela rapport</button>
                <button class="mini" id="fitAllBtn">Visa alla skötselytor</button>
                <button class="mini" id="clearTodayBtn">Rensa dagens rutt</button>
                <button class="delete" id="clearAllBtn">Rensa alla rutter</button>

                <div class="list" id="dayList"></div>
              </div>
            </div>

            <div class="toast" id="toast">Sparat</div>

            <script>
              const STORE_KEY = "skotselytor_status_v26";
              const TRACK_KEY = "skotselytor_track_v26";
              const PINS_KEY = "skotselytor_pins_v26";

              const OLD_STATUS_KEY = "skotselytor_status_v25";
              const OLD_TRACK_KEY = "skotselytor_track_v25";
              const OLD_PINS_KEY = "skotselytor_pins_v25";

              const MAX_ACCURACY = 80;
              const MIN_DISTANCE = 2.5;
              const MAX_JUMP = 120;

              let statuses = JSON.parse(localStorage.getItem(STORE_KEY) || localStorage.getItem(OLD_STATUS_KEY) || "{}");
              let track = JSON.parse(localStorage.getItem(TRACK_KEY) || localStorage.getItem(OLD_TRACK_KEY) || "[]");
              let pins = JSON.parse(localStorage.getItem(PINS_KEY) || localStorage.getItem(OLD_PINS_KEY) || "[]");

              localStorage.setItem(STORE_KEY, JSON.stringify(statuses));
              localStorage.setItem(TRACK_KEY, JSON.stringify(track));
              localStorage.setItem(PINS_KEY, JSON.stringify(pins));

              let map;
              let skotselLayer;
              let routeLayer;
              let pinLayer;
              let gpsLayer;
              let accuracyCircle;
              let gpsMarker;
              let routeLine;

              let selectedAreaLayer = null;
              let selectedAreaId = null;
              let selectedPinId = null;
              let pendingPinLatLng = null;
              let areaStatus = "Ej klippt";

              let watchId = null;
              let tracking = false;
              let followMode = "none";
              let addPinMode = false;

              let lastGpsPoint = null;
              let lastGpsBearing = null;
              let deviceHeading = null;

              let smooth = {
                currentLat:null,
                currentLon:null,
                targetLat:null,
                targetLon:null,
                currentHeading:0,
                targetHeading:0,
                animating:false
              };

              init();

              async function init() {
                map = L.map("map", {
                  zoomControl:false,
                  preferCanvas:true,
                  inertia:true,
                  inertiaDeceleration:3500,
                  wheelDebounceTime:40,
                  wheelPxPerZoomLevel:90
                }).setView([58.4108, 15.6214], 13);

                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                  maxZoom:22,
                  maxNativeZoom:19,
                  attribution:"© OpenStreetMap",
                  updateWhenIdle:true,
                  keepBuffer:2
                }).addTo(map);

                L.control.zoom({ position:"bottomright" }).addTo(map);

                routeLayer = L.layerGroup().addTo(map);
                pinLayer = L.layerGroup().addTo(map);
                gpsLayer = L.layerGroup().addTo(map);

                bindButtons();
                bindMap();
                startCompass();

                redrawTrack();
                redrawPins();
                updateStats();

                await loadSkotselytor();
                setInterval(pollNativeTrack, 2000);
              }

              async function loadSkotselytor() {
                try {
                  document.getElementById("dataInfo").textContent = "Läser skötselytor från mobilen...";

                  let text = "";

                  try {
                    const res = await fetch("skotselytor.geojson", { cache:"force-cache" });
                    text = await res.text();
                  } catch(e) {}

                  if (!text && window.AndroidBridge && window.AndroidBridge.readAsset) {
                    text = window.AndroidBridge.readAsset("skotselytor.geojson");
                  }

                  if (!text) throw new Error("Tom GeoJSON");

                  const data = JSON.parse(text);
                  const count = data && data.features ? data.features.length : 0;

                  skotselLayer = L.geoJSON(data, {
                    renderer:L.canvas({ padding:0.5 }),
                    smoothFactor:2.0,
                    style:featureStyle,
                    onEachFeature:onEachFeature
                  }).addTo(map);

                  const bounds = skotselLayer.getBounds();

                  if (bounds && bounds.isValid && bounds.isValid()) {
                    map.fitBounds(bounds, { padding:[25,25], animate:false });
                  }

                  document.getElementById("dataInfo").textContent = "Offline-data: " + count + " ytor";
                  showToast("Offline-karta laddad");
                } catch(e) {
                  document.getElementById("dataInfo").textContent = "Kunde inte läsa offline-data";
                  showToast("Fel: offline-data saknas");
                  console.log(e);
                }
              }

              function featureStyle(feature) {
                const p = feature.properties || {};
                const id = getFeatureId(p);
                const saved = statuses[id];

                if (saved && saved.status === "Klippt") {
                  return { color:"#16a34a", weight:1.4, fillColor:"#22c55e", fillOpacity:0.42 };
                }

                if (saved && saved.status === "Pågår") {
                  return { color:"#f59e0b", weight:1.6, fillColor:"#fbbf24", fillOpacity:0.42 };
                }

                if (saved && saved.status === "Problem") {
                  return { color:"#ef4444", weight:1.8, fillColor:"#f87171", fillOpacity:0.48 };
                }

                const sub = String(p.SUBTYP || p.subtyp || "").toLowerCase();

                if (sub.includes("bruks")) {
                  return { color:"#0f766e", weight:0.9, fillColor:"#22c55e", fillOpacity:0.22 };
                }

                if (sub.includes("äng") || sub.includes("ang") || sub.includes("hög")) {
                  return { color:"#a16207", weight:0.9, fillColor:"#eab308", fillOpacity:0.20 };
                }

                return { color:"#082e5c", weight:0.8, fillColor:"#38bdf8", fillOpacity:0.16 };
              }

              function onEachFeature(feature, layer) {
                layer.on("click", function() {
                  selectedAreaLayer = layer;
                  openAreaPanel(feature, layer);
                });
              }

              function bindButtons() {
                document.getElementById("gpsBtn").onclick = gpsButtonClick;
                document.getElementById("trackBtn").onclick = toggleTrack;
                document.getElementById("pinBtn").onclick = togglePinMode;
                document.getElementById("pinGpsBtn").onclick = createPinAtGps;
                document.getElementById("reportBtn").onclick = openMenu;
                document.getElementById("menuBtn").onclick = openMenu;
                document.getElementById("closeMenu").onclick = closeMenu;
                document.getElementById("closeArea").onclick = () => document.getElementById("areaPanel").classList.remove("open");
                document.getElementById("closePin").onclick = closePinPanel;
                document.getElementById("shareReportBtn").onclick = shareReport;
                document.getElementById("fitAllBtn").onclick = fitAllSkotselytor;
                document.getElementById("clearTodayBtn").onclick = clearTodayRoute;
                document.getElementById("clearAllBtn").onclick = clearAllRoutes;
                document.getElementById("movePinGpsBtn").onclick = movePinToGps;
                document.getElementById("savePinBtn").onclick = savePin;
                document.getElementById("deletePinBtn").onclick = deletePin;
                document.getElementById("saveAreaBtn").onclick = saveAreaStatus;

                document.querySelectorAll("[data-status]").forEach(b => {
                  b.onclick = () => {
                    areaStatus = b.dataset.status;
                    markAreaStatus();
                  };
                });
              }

              function bindMap() {
                map.on("dragstart zoomstart", () => {
                  if (followMode !== "none") {
                    setFollowMode("none", false);
                    showToast("Fri karta");
                  }
                });

                map.on("click", e => {
                  if (addPinMode) {
                    createPinAtLatLng(e.latlng, "Nål skapad");
                    setPinMode(false);
                  }
                });

                map.on("contextmenu", e => {
                  createPinAtLatLng(e.latlng, "Nål skapad");
                });
              }

              function startCompass() {
                const handler = e => {
                  let h = null;

                  if (typeof e.webkitCompassHeading === "number") {
                    h = e.webkitCompassHeading;
                  } else if (typeof e.alpha === "number") {
                    h = normalizeAngle(360 - e.alpha);
                  }

                  if (Number.isFinite(h)) {
                    deviceHeading = h;
                  }
                };

                try {
                  window.addEventListener("deviceorientationabsolute", handler, true);
                  window.addEventListener("deviceorientation", handler, true);
                } catch(e) {}
              }

              function toggleTrack() {
                tracking ? stopTrack() : startTrack();
              }

              function startTrack() {
                tracking = true;
                setFollowMode("center", false);

                document.getElementById("trackBtn").classList.add("warn");
                document.getElementById("trackBtn").textContent = "Stoppa";

                try {
                  if (window.AndroidBridge && window.AndroidBridge.startBackgroundTracking) {
                    window.AndroidBridge.startBackgroundTracking();
                  }
                } catch(e) {}

                if (navigator.geolocation && watchId === null) {
                  watchId = navigator.geolocation.watchPosition(onPos, err => {
                    showToast("GPS-fel");
                    console.log(err);
                  }, {
                    enableHighAccuracy:true,
                    maximumAge:1000,
                    timeout:10000
                  });
                }

                pollNativeTrack();
                showToast("Spårning startad");
              }

              function stopTrack() {
                tracking = false;
                setFollowMode("none", false);

                if (watchId !== null && navigator.geolocation) {
                  navigator.geolocation.clearWatch(watchId);
                  watchId = null;
                }

                try {
                  if (window.AndroidBridge && window.AndroidBridge.stopBackgroundTracking) {
                    window.AndroidBridge.stopBackgroundTracking();
                  }
                } catch(e) {}

                document.getElementById("trackBtn").classList.remove("warn");
                document.getElementById("trackBtn").textContent = "Spåra";
                showToast("Spårning stoppad");
              }

              function pollNativeTrack() {
                try {
                  if (window.AndroidBridge && window.AndroidBridge.getNativeTrack) {
                    mergeNativeTrack(window.AndroidBridge.getNativeTrack());
                  }
                } catch(e) {}
              }

              window.mergeNativeTrack = mergeNativeTrack;

              function mergeNativeTrack(nativeTrackText) {
                try {
                  const nativeTrack = JSON.parse(nativeTrackText || "[]");
                  if (!Array.isArray(nativeTrack) || nativeTrack.length === 0) return;

                  const existing = new Set(track.map(p => String(p.time) + "_" + p.lat + "_" + p.lon));
                  let added = 0;

                  nativeTrack.forEach(p => {
                    const normalized = {
                      lat:Number(p.lat),
                      lon:Number(p.lon),
                      accuracy:Number(p.accuracy || 0),
                      heading:p.heading === null || p.heading === undefined ? null : Number(p.heading),
                      speed:p.speed === null || p.speed === undefined ? null : Number(p.speed),
                      time:typeof p.time === "number" ? new Date(p.time).toISOString() : p.time,
                      native:true
                    };

                    const key = String(normalized.time) + "_" + normalized.lat + "_" + normalized.lon;

                    if (Number.isFinite(normalized.lat) && Number.isFinite(normalized.lon) && !existing.has(key)) {
                      track.push(normalized);
                      existing.add(key);
                      added++;
                    }
                  });

                  if (!added) return;

                  track.sort((a,b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                  localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                  const last = track[track.length - 1];

                  if (last) {
                    lastGpsPoint = last;
                    setSmoothTarget(last);
                  }

                  redrawTrack();
                  updateStats();
                } catch(e) {
                  console.log("mergeNativeTrack error", e);
                }
              }

              function onPos(pos) {
                const c = pos.coords;

                const p = {
                  lat:c.latitude,
                  lon:c.longitude,
                  accuracy:Math.round(c.accuracy || 0),
                  heading:Number.isFinite(c.heading) ? c.heading : null,
                  speed:Number.isFinite(c.speed) ? c.speed : null,
                  time:new Date(pos.timestamp || Date.now()).toISOString()
                };

                document.getElementById("gpsInfo").textContent = "±" + p.accuracy + " m";

                if (p.accuracy > MAX_ACCURACY) {
                  showToast("GPS osäker ±" + p.accuracy + " m");
                  return;
                }

                const last = track[track.length - 1];

                if (last) {
                  const d = distance(last.lat,last.lon,p.lat,p.lon);

                  if (d < MIN_DISTANCE) {
                    lastGpsPoint = p;
                    setSmoothTarget(p);
                    return;
                  }

                  if (d > MAX_JUMP && p.accuracy > 25) {
                    showToast("GPS-hopp ignorerat");
                    return;
                  }
                }

                if (!Number.isFinite(p.heading) && track.length) {
                  const prev = track[track.length - 1];
                  const d = distance(prev.lat, prev.lon, p.lat, p.lon);
                  if (d >= 1.5) p.heading = bearing(prev.lat, prev.lon, p.lat, p.lon);
                }

                if (Number.isFinite(p.heading)) lastGpsBearing = p.heading;

                lastGpsPoint = p;
                track.push(p);
                localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                setSmoothTarget(p);
                redrawTrack();
                updateStats();
              }

              function setSmoothTarget(p) {
                smooth.targetLat = p.lat;
                smooth.targetLon = p.lon;
                smooth.targetHeading = getBestHeading(p);

                if (smooth.currentLat === null || smooth.currentLon === null) {
                  smooth.currentLat = p.lat;
                  smooth.currentLon = p.lon;
                  smooth.currentHeading = smooth.targetHeading;
                }

                if (!smooth.animating) {
                  smooth.animating = true;
                  requestAnimationFrame(smoothFrame);
                }
              }

              function getBestHeading(p) {
                if (Number.isFinite(deviceHeading)) return deviceHeading;
                if (p && Number.isFinite(p.heading)) return p.heading;
                if (Number.isFinite(lastGpsBearing)) return lastGpsBearing;
                return smooth.currentHeading || 0;
              }

              function smoothFrame() {
                if (smooth.targetLat === null || smooth.targetLon === null) {
                  smooth.animating = false;
                  return;
                }

                smooth.targetHeading = getBestHeading(lastGpsPoint);

                const k = 0.15;
                smooth.currentLat += (smooth.targetLat - smooth.currentLat) * k;
                smooth.currentLon += (smooth.targetLon - smooth.currentLon) * k;
                smooth.currentHeading = lerpAngle(smooth.currentHeading, smooth.targetHeading, 0.13);

                drawSmoothGps();

                const remaining = Math.abs(smooth.targetLat - smooth.currentLat) + Math.abs(smooth.targetLon - smooth.currentLon);

                if (remaining > 0.0000002 || tracking) {
                  requestAnimationFrame(smoothFrame);
                } else {
                  smooth.animating = false;
                }
              }

              function drawSmoothGps() {
                if (!Number.isFinite(smooth.currentLat) || !Number.isFinite(smooth.currentLon)) return;

                const latlng = L.latLng(smooth.currentLat, smooth.currentLon);
                const acc = Math.max(lastGpsPoint && lastGpsPoint.accuracy ? lastGpsPoint.accuracy : 8, 5);

                if (!accuracyCircle) {
                  accuracyCircle = L.circle(latlng, {
                    radius:acc,
                    color:"#38bdf8",
                    weight:1,
                    opacity:0.35,
                    fillColor:"#38bdf8",
                    fillOpacity:0.08,
                    interactive:false
                  }).addTo(gpsLayer);
                } else {
                  accuracyCircle.setLatLng(latlng);
                  accuracyCircle.setRadius(acc);
                }

                const icon = L.divIcon({
                  className:"",
                  html:'<div class="gpsArrow" style="transform:rotate(' + smooth.currentHeading + 'deg)"></div>',
                  iconSize:[26,32],
                  iconAnchor:[13,18]
                });

                if (!gpsMarker) {
                  gpsMarker = L.marker(latlng, {
                    icon,
                    interactive:false,
                    zIndexOffset:9999
                  }).addTo(gpsLayer);
                } else {
                  gpsMarker.setLatLng(latlng);
                  gpsMarker.setIcon(icon);
                }

                maybeUpdateCamera(latlng);
              }

              function maybeUpdateCamera(latlng) {
                if (followMode === "none") return;
                map.panTo(latlng, { animate:true, duration:0.22 });
              }

              function gpsButtonClick() {
                if (!tracking) {
                  startTrack();
                  setFollowMode("center", true);
                  return;
                }

                if (followMode === "none") setFollowMode("center", true);
                else setFollowMode("none", false);
              }

              function setFollowMode(mode, jumpNow) {
                followMode = mode;
                const btn = document.getElementById("gpsBtn");

                if (mode === "none") {
                  btn.textContent = "GPS";
                  btn.classList.remove("warn");
                } else {
                  btn.textContent = "Följer";
                  btn.classList.add("warn");
                }

                if (jumpNow && lastGpsPoint) {
                  const latlng = L.latLng(lastGpsPoint.lat, lastGpsPoint.lon);
                  map.setView(latlng, Math.max(map.getZoom(), 17), { animate:true });
                  showToast("Centrerad på GPS");
                }
              }

              function redrawTrack() {
                if (routeLine) {
                  routeLayer.removeLayer(routeLine);
                  routeLine = null;
                }

                if (track.length < 2) return;

                routeLine = L.polyline(track.map(p => [p.lat, p.lon]), {
                  color:"#0ea5e9",
                  weight:5,
                  opacity:0.95,
                  lineCap:"round",
                  lineJoin:"round",
                  smoothFactor:1.2,
                  interactive:false
                }).addTo(routeLayer);
              }

              function createPinAtLatLng(latlng, msg) {
                if (!latlng) {
                  showToast("Kunde inte läsa plats");
                  return;
                }

                const autoPin = {
                  id:"pin_" + Date.now(),
                  lat:latlng.lat,
                  lon:latlng.lng,
                  type:"Handjagare krävs",
                  comment:"",
                  status:"Öppen",
                  createdAt:new Date().toISOString(),
                  updatedAt:new Date().toISOString()
                };

                pins.push(autoPin);
                selectedPinId = autoPin.id;
                localStorage.setItem(PINS_KEY, JSON.stringify(pins));

                redrawPins();
                updateStats();
                openPinPanelForExisting(autoPin.id);
                showToast(msg || "Nål skapad");
              }

              function createPinAtGps() {
                if (!lastGpsPoint) {
                  showToast("Starta GPS först");
                  return;
                }

                createPinAtLatLng(L.latLng(lastGpsPoint.lat, lastGpsPoint.lon), "Nål skapad vid GPS");
              }

              function movePinToGps() {
                if (!lastGpsPoint) {
                  showToast("Ingen GPS-position ännu");
                  return;
                }

                pendingPinLatLng = L.latLng(lastGpsPoint.lat, lastGpsPoint.lon);
                updatePinCoordsText(pendingPinLatLng);
                showToast("Nål flyttad till GPS");
              }

              function openPinPanelForExisting(id) {
                const p = pins.find(x => x.id === id);
                if (!p) return;

                selectedPinId = id;
                pendingPinLatLng = L.latLng(p.lat, p.lon);

                closeMenu();
                document.getElementById("areaPanel").classList.remove("open");

                document.getElementById("pinTitle").textContent = p.type || "Egen nål";
                document.getElementById("pinSub").textContent = p.createdAt ? "Skapad: " + new Date(p.createdAt).toLocaleString("sv-SE") : "Sparad nål";
                updatePinCoordsText(pendingPinLatLng);

                document.getElementById("pinType").value = p.type || "Annat";
                document.getElementById("pinComment").value = p.comment || "";
                document.getElementById("pinStatus").value = p.status || "Öppen";
                document.getElementById("deletePinBtn").classList.remove("hidden");
                document.getElementById("pinPanel").classList.add("open");
              }

              function savePin() {
                if (!pendingPinLatLng) {
                  showToast("Ingen nålposition vald");
                  return;
                }

                const existing = pins.find(x => x.id === selectedPinId);

                const data = {
                  id:selectedPinId || ("pin_" + Date.now()),
                  lat:pendingPinLatLng.lat,
                  lon:pendingPinLatLng.lng,
                  type:document.getElementById("pinType").value,
                  comment:document.getElementById("pinComment").value,
                  status:document.getElementById("pinStatus").value,
                  createdAt:existing ? existing.createdAt : new Date().toISOString(),
                  updatedAt:new Date().toISOString()
                };

                const ix = pins.findIndex(x => x.id === data.id);

                if (ix >= 0) pins[ix] = data;
                else pins.push(data);

                localStorage.setItem(PINS_KEY, JSON.stringify(pins));

                redrawPins();
                updateStats();
                showToast("Nål sparad");
                closePinPanel();
              }

              function deletePin() {
                if (!selectedPinId) return;
                if (!confirm("Ta bort denna nål?")) return;

                pins = pins.filter(x => x.id !== selectedPinId);
                localStorage.setItem(PINS_KEY, JSON.stringify(pins));
                redrawPins();
                updateStats();
                closePinPanel();
                showToast("Nål borttagen");
              }

              function redrawPins() {
                pinLayer.clearLayers();

                pins.forEach(p => {
                  if (!Number.isFinite(Number(p.lat)) || !Number.isFinite(Number(p.lon))) return;

                  const color = pinColor(p.type, p.status);
                  const icon = L.divIcon({
                    className:"",
                    html:'<div class="pinIcon" style="background:' + color + '">!</div>',
                    iconSize:[34,34],
                    iconAnchor:[17,17]
                  });

                  L.marker([p.lat, p.lon], {
                    icon,
                    zIndexOffset:5000
                  }).on("click", () => openPinPanelForExisting(p.id)).addTo(pinLayer);
                });
              }

              function pinColor(type,status) {
                if (status === "Fixad") return "#22c55e";
                if (type === "Handjagare krävs") return "#f59e0b";
                if (type === "Går ej klippa") return "#ef4444";
                if (type === "Hinder") return "#a855f7";
                return "#0ea5e9";
              }

              function openAreaPanel(feature, layer) {
                closePinPanel();
                closeMenu();

                const p = feature.properties || {};
                const id = getFeatureId(p);
                selectedAreaId = id;

                const saved = statuses[id];
                areaStatus = saved ? saved.status : "Ej klippt";

                document.getElementById("areaTitle").textContent = label(p.SUBTYP || p.subtyp || p.TYP || "Skötselyta");
                document.getElementById("mId").textContent = id || "-";
                document.getElementById("mType").textContent = p.TYP || p.typ || "-";
                document.getElementById("mSubType").textContent = p.SUBTYP || p.subtyp || "-";
                document.getElementById("mTeam").textContent = p.TEAM || p.Team || p.team || "-";
                document.getElementById("mDistrict").textContent = p.DISTRIKT || p.distrikt || "-";
                document.getElementById("mArea").textContent = formatArea(p.Shape__Area || p.shape__area || p.area);

                document.getElementById("comment").value = saved ? saved.comment : "";

                markAreaStatus();
                document.getElementById("areaPanel").classList.add("open");
              }

              function saveAreaStatus() {
                if (!selectedAreaId) return;

                statuses[selectedAreaId] = {
                  id:selectedAreaId,
                  status:areaStatus,
                  worker:document.getElementById("worker").value,
                  comment:document.getElementById("comment").value,
                  savedAt:new Date().toISOString(),
                  title:document.getElementById("areaTitle").textContent,
                  type:document.getElementById("mType").textContent,
                  subtyp:document.getElementById("mSubType").textContent,
                  team:document.getElementById("mTeam").textContent,
                  distrikt:document.getElementById("mDistrict").textContent
                };

                localStorage.setItem(STORE_KEY, JSON.stringify(statuses));

                if (selectedAreaLayer && selectedAreaLayer.feature) {
                  selectedAreaLayer.setStyle(featureStyle(selectedAreaLayer.feature));
                }

                updateStats();
                showToast("Status sparad");
              }

              function markAreaStatus() {
                document.querySelectorAll("[data-status]").forEach(b => {
                  b.classList.toggle("active", b.dataset.status === areaStatus);
                });
              }

              function togglePinMode() {
                setPinMode(!addPinMode);
              }

              function setPinMode(v) {
                addPinMode = v;
                document.getElementById("pinBtn").classList.toggle("danger", addPinMode);
                document.getElementById("pinHint").classList.toggle("show", addPinMode);
                document.getElementById("pinBtn").textContent = addPinMode ? "Avbryt" : "Nål";
              }

              function closePinPanel() {
                document.getElementById("pinPanel").classList.remove("open");
                selectedPinId = null;
                pendingPinLatLng = null;
              }

              function updatePinCoordsText(latlng) {
                if (!latlng) return;
                document.getElementById("pinX").textContent = Number(latlng.lng).toFixed(5);
                document.getElementById("pinY").textContent = Number(latlng.lat).toFixed(5);
              }

              function openMenu() {
                closePinPanel();
                document.getElementById("areaPanel").classList.remove("open");
                updateStats();
                document.getElementById("menuPanel").classList.add("open");
              }

              function closeMenu() {
                document.getElementById("menuPanel").classList.remove("open");
              }

              function fitAllSkotselytor() {
                closeMenu();

                if (skotselLayer) {
                  const b = skotselLayer.getBounds();
                  if (b && b.isValid && b.isValid()) {
                    map.fitBounds(b, { padding:[25,25], animate:true });
                  }
                }
              }

              function updateStats() {
                const today = todayKey();
                const todayPoints = track.filter(p => dayKey(p.time) === today);
                const km = routeDistance(todayPoints) / 1000;
                const mins = routeMinutes(todayPoints);

                document.getElementById("todayKm").textContent = km.toFixed(2).replace(".", ",") + " km";
                document.getElementById("pointCount").textContent = String(track.length);

                document.getElementById("menuTodayKm").textContent = km.toFixed(2).replace(".", ",") + " km";
                document.getElementById("menuTodayTime").textContent = mins + " min";
                document.getElementById("menuPins").textContent = String(pins.length);
                document.getElementById("menuStatuses").textContent = String(Object.keys(statuses).length);

                renderDayList();
              }

              function renderDayList() {
                const box = document.getElementById("dayList");
                if (!box) return;

                const days = {};

                track.forEach(p => {
                  const k = dayKey(p.time);
                  if (!days[k]) days[k] = [];
                  days[k].push(p);
                });

                const keys = Object.keys(days).sort().reverse();
                box.innerHTML = "";

                if (!keys.length) {
                  box.innerHTML = '<div class="listItem"><b>Ingen rutt ännu</b><span>Starta spårning för att samla statistik.</span></div>';
                  return;
                }

                keys.slice(0,14).forEach(k => {
                  const pts = days[k];
                  const km = routeDistance(pts) / 1000;
                  const mins = routeMinutes(pts);

                  const div = document.createElement("div");
                  div.className = "listItem";
                  div.innerHTML =
                    "<b>" + k + "</b>" +
                    "<span>" + km.toFixed(2).replace(".", ",") + " km • " + mins + " min • " + pts.length + " punkter</span>";
                  box.appendChild(div);
                });
              }

              function shareReport() {
                const today = todayKey();
                const todayPoints = track.filter(p => dayKey(p.time) === today);
                const km = routeDistance(todayPoints) / 1000;
                const mins = routeMinutes(todayPoints);
                const todayStatuses = Object.values(statuses).filter(s => dayKey(s.savedAt) === today);
                const openPins = pins.filter(p => p.status !== "Fixad");
                const fixedPins = pins.filter(p => p.status === "Fixad");

                let text = "";
                text += "Skötselytor GPS - dagsrapport\n";
                text += "Datum: " + today + "\n\n";
                text += "Rutt: " + km.toFixed(2).replace(".", ",") + " km\n";
                text += "Spårad tid: " + mins + " min\n";
                text += "GPS-punkter: " + todayPoints.length + "\n\n";
                text += "Nålar totalt: " + pins.length + "\n";
                text += "Öppna nålar: " + openPins.length + "\n";
                text += "Fixade nålar: " + fixedPins.length + "\n\n";
                text += "Statusar sparade idag: " + todayStatuses.length + "\n";

                if (todayStatuses.length) {
                  text += "\nYtor idag:\n";
                  todayStatuses.forEach(s => {
                    text += "- " + (s.subtyp || s.title || "Yta") + " / " + s.status + " / " + (s.comment || "ingen kommentar") + "\n";
                  });
                }

                if (pins.length) {
                  text += "\nNålar:\n";
                  pins.forEach(p => {
                    text += "- " + p.type + " / " + p.status + " / " + (p.comment || "ingen kommentar") + "\n";
                  });
                }

                try {
                  if (window.AndroidBridge && window.AndroidBridge.shareText) {
                    window.AndroidBridge.shareText("Skötselytor GPS rapport " + today, text);
                  } else {
                    alert(text);
                  }
                } catch(e) {
                  alert(text);
                }
              }

              function clearTodayRoute() {
                const today = todayKey();
                if (!confirm("Rensa dagens rutt? Nålar och statusar sparas.")) return;

                track = track.filter(p => dayKey(p.time) !== today);
                localStorage.setItem(TRACK_KEY, JSON.stringify(track));
                redrawTrack();
                updateStats();
                showToast("Dagens rutt rensad");
              }

              function clearAllRoutes() {
                if (!confirm("Rensa alla rutter? Nålar och statusar sparas.")) return;

                track = [];
                localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                try {
                  if (window.AndroidBridge && window.AndroidBridge.clearNativeTrack) {
                    window.AndroidBridge.clearNativeTrack();
                  }
                } catch(e) {}

                routeLayer.clearLayers();
                routeLine = null;
                updateStats();
                showToast("Alla rutter rensade");
              }

              function routeDistance(points) {
                let total = 0;

                for (let i = 1; i < points.length; i++) {
                  total += distance(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
                }

                return total;
              }

              function routeMinutes(points) {
                if (points.length < 2) return 0;

                const a = new Date(points[0].time).getTime();
                const b = new Date(points[points.length - 1].time).getTime();

                return Math.max(0, Math.round((b - a) / 60000));
              }

              function dayKey(t) {
                const d = new Date(t);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2,"0");
                const day = String(d.getDate()).padStart(2,"0");
                return y + "-" + m + "-" + day;
              }

              function todayKey() {
                return dayKey(new Date().toISOString());
              }

              function distance(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const r = d => d * Math.PI / 180;
                const dLat = r(lat2 - lat1);
                const dLon = r(lon2 - lon1);

                const a =
                  Math.sin(dLat / 2) ** 2 +
                  Math.cos(r(lat1)) * Math.cos(r(lat2)) *
                  Math.sin(dLon / 2) ** 2;

                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
              }

              function bearing(lat1, lon1, lat2, lon2) {
                const r = d => d * Math.PI / 180;
                const y = Math.sin(r(lon2 - lon1)) * Math.cos(r(lat2));
                const x =
                  Math.cos(r(lat1)) * Math.sin(r(lat2)) -
                  Math.sin(r(lat1)) * Math.cos(r(lat2)) * Math.cos(r(lon2 - lon1));

                return normalizeAngle((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
              }

              function lerpAngle(a, b, t) {
                let diff = ((b - a + 540) % 360) - 180;
                return normalizeAngle(a + diff * t);
              }

              function normalizeAngle(a) {
                return ((a % 360) + 360) % 360;
              }

              function getFeatureId(p) {
                return String(
                  p.OBJECTID ||
                  p.objectid ||
                  p.OBJECTID_1 ||
                  p.GlobalID ||
                  p.globalid ||
                  p.id ||
                  "yta_" + Math.random()
                );
              }

              function formatArea(v) {
                const n = Number(v);

                if (!Number.isFinite(n)) return "-";

                if (n > 10000) {
                  return (n / 10000).toFixed(2).replace(".", ",") + " ha";
                }

                return Math.round(n).toLocaleString("sv-SE") + " m²";
              }

              function label(v) {
                const raw = String(v || "").trim();
                const key = raw.toLowerCase();

                const m = {
                  bruksgrasmatta:"Bruksgräsmatta",
                  hogvuxen_grasyta_ang:"Högvuxen gräsyta/Äng",
                  bruksgrasmatta_robot:"Bruksgräsmatta med robot",
                  plantering:"Plantering",
                  naturmark:"Naturmark",
                  grasarmering:"Gräsarmering"
                };

                return m[key] || raw || "Skötselyta";
              }

              let toastTimer;

              function showToast(t) {
                const el = document.getElementById("toast");
                el.textContent = t;
                el.classList.add("show");
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
              }
            </script>
          </body>
          </html>
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-gps-apk
          path: app/build/outputs/apk/debug/app-debug.apk
