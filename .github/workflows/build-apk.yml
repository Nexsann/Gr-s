                box-shadow:0 12px 28px rgba(0,0,0,.3);
              }

              .toast.show {
                opacity:1;
              }

              .hint {
                position:fixed;
                left:50%;
                top:128px;
                transform:translateX(-50%);
                z-index:90;
                background:#ef4444;
                color:white;
                border-radius:999px;
                padding:10px 14px;
                font-size:13px;
                font-weight:900;
                box-shadow:0 10px 25px rgba(0,0,0,.25);
                display:none;
                white-space:nowrap;
              }

              .hint.show {
                display:block;
              }

              .list {
                display:grid;
                gap:8px;
                margin-top:10px;
              }

              .listItem {
                background:#f8fafc;
                border:1px solid #e2e8f0;
                border-radius:14px;
                padding:10px;
              }

              .listItem b {
                display:block;
                font-size:13px;
              }

              .listItem span {
                display:block;
                font-size:12px;
                color:#64748b;
                margin-top:3px;
              }
            </style>
          </head>
          <body>
            <div id="viewDiv"></div>

            <div class="topbar">
              <div class="title">
                <b>Skötselytor GPS</b>
                <span>Långtryck = nål • Spåra = bakgrund</span>
              </div>
              <button class="btn" id="pinBtn">Nål</button>
              <button class="btn" id="trackBtn">Spåra</button>
              <button class="primary" id="gpsBtn">GPS</button>
            </div>

            <div class="infoCard">
              <div class="stat"><b>GPS</b><span id="gpsInfo">Ej aktiv</span></div>
              <div class="stat"><b>Idag</b><span id="todayKm">0,00 km</span></div>
              <div class="stat"><b>Punkter</b><span id="pointCount">0</span></div>
            </div>

            <div class="hint" id="pinHint">Tryck på kartan där nålen ska hamna</div>

            <div class="floating">
              <button id="menuBtn">Meny</button>
              <button id="pinGpsBtn">Nål här</button>
              <button id="reportBtn">Rapport</button>
            </div>

            <div class="panel" id="areaPanel">
              <div class="panelHead">
                <div>
                  <h2 id="areaTitle">Vald yta</h2>
                  <small>Klippstatus för vald skötselyta</small>
                </div>
                <button id="closeArea">×</button>
              </div>
              <div class="panelBody">
                <div class="meta">
                  <div><b>ID</b><span id="mId">-</span></div>
                  <div><b>Typ</b><span id="mType">-</span></div>
                  <div><b>Team</b><span id="mTeam">-</span></div>
                  <div><b>Distrikt</b><span id="mDistrict">-</span></div>
                </div>

                <input id="worker" placeholder="Ditt namn">

                <div class="statuses">
                  <button data-status="Ej klippt">Ej klippt</button>
                  <button data-status="Pågår">Pågår</button>
                  <button data-status="Klippt">Klippt</button>
                  <button data-status="Problem">Problem</button>
                </div>

                <textarea id="comment" rows="3" placeholder="Kommentar"></textarea>
                <button class="save" id="saveAreaBtn">Spara status</button>
              </div>
            </div>

            <div class="panel" id="pinPanel">
              <div class="panelHead">
                <div>
                  <h2 id="pinTitle">Egen nål</h2>
                  <small id="pinSub">Kommentar/avvikelse på kartan</small>
                </div>
                <button id="closePin">×</button>
              </div>
              <div class="panelBody">
                <div class="meta">
                  <div><b>Lon/X</b><span id="pinX">-</span></div>
                  <div><b>Lat/Y</b><span id="pinY">-</span></div>
                </div>

                <select id="pinType">
                  <option value="Handjagare krävs">Handjagare krävs</option>
                  <option value="Hinder">Hinder</option>
                  <option value="Går ej klippa">Går ej klippa</option>
                  <option value="Behöver kollas">Behöver kollas</option>
                  <option value="Annat">Annat</option>
                </select>

                <textarea id="pinComment" rows="4" placeholder="Kommentar, t.ex. handjagare krävs runt stolpar"></textarea>

                <select id="pinStatus">
                  <option value="Öppen">Öppen</option>
                  <option value="Fixad">Fixad</option>
                </select>

                <div class="row">
                  <button class="mini" id="movePinCenterBtn">Flytta till mitten</button>
                  <button class="mini" id="movePinGpsBtn">Flytta till GPS</button>
                </div>

                <button class="save" id="savePinBtn">Spara nål</button>
                <button class="delete hidden" id="deletePinBtn">Ta bort nål</button>
              </div>
            </div>

            <div class="panel" id="menuPanel">
              <div class="panelHead">
                <div>
                  <h2>Meny</h2>
                  <small>Statistik, rutter och rapport</small>
                </div>
                <button id="closeMenu">×</button>
              </div>
              <div class="panelBody">
                <div class="meta">
                  <div><b>Idag</b><span id="menuTodayKm">0,00 km</span></div>
                  <div><b>Tid</b><span id="menuTodayTime">0 min</span></div>
                  <div><b>Nålar</b><span id="menuPins">0</span></div>
                  <div><b>Ytstatus</b><span id="menuStatuses">0</span></div>
                </div>

                <button class="save" id="shareReportBtn">Dela rapport</button>
                <button class="mini" id="clearTodayBtn" style="width:100%;margin-top:8px;">Rensa dagens rutt</button>
                <button class="delete" id="clearAllBtn">Rensa alla rutter</button>

                <div class="list" id="dayList"></div>
              </div>
            </div>

            <div class="toast" id="toast">Sparat</div>

            <script>
              require([
                "esri/config",
                "esri/WebMap",
                "esri/views/MapView",
                "esri/layers/FeatureLayer",
                "esri/layers/GraphicsLayer",
                "esri/Graphic",
                "esri/geometry/Polyline",
                "esri/geometry/geometryEngine"
              ], function(esriConfig, WebMap, MapView, FeatureLayer, GraphicsLayer, Graphic, Polyline, geometryEngine) {

                esriConfig.portalUrl = "https://kartor.linkoping.se/portal";

                const WEBMAP_ID = "4811ba982b9e4a97b01cf4353224374b";
                const LAYER_URL = "https://kartor.linkoping.se/arcgis/rest/services/sts_omradeskarta/sts_skotselkartan_l/MapServer/32";

                const STORE_KEY = "skotselytor_status_v2";
                const TRACK_KEY = "skotselytor_track_v4";
                const PINS_KEY = "skotselytor_pins_v4";

                const GOOD_ACCURACY = 35;
                const BAD_ACCURACY = 90;
                const IMPOSSIBLE_JUMP_METERS = 90;
                const MIN_TRACK_DISTANCE_METERS = 3;

                let selectedArea = null;
                let selectedPinId = null;
                let pendingPinGeometry = null;
                let areaStatus = "Ej klippt";
                let watchId = null;
                let tracking = false;
                let addPinMode = false;
                let gpsGraphic = null;
                let accGraphic = null;
                let lineGraphic = null;
                let lastGpsPoint = null;
                let followGps = false;
                let lastHeading = null;
                let viewReady = false;

                const statuses = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
                let track = JSON.parse(localStorage.getItem(TRACK_KEY) || "[]");
                let pins = JSON.parse(localStorage.getItem(PINS_KEY) || "[]");

                const statusLayer = new GraphicsLayer({ title:"Klippstatus" });
                const pinLayer = new GraphicsLayer({ title:"Egna nålar" });
                const gpsLayer = new GraphicsLayer({ title:"GPS" });

                const webmap = new WebMap({
                  portalItem: {
                    id: WEBMAP_ID,
                    portal: { url: "https://kartor.linkoping.se/portal" }
                  }
                });

                const skotselLayer = new FeatureLayer({
                  url: LAYER_URL,
                  outFields:["*"],
                  opacity:0.16,
                  popupEnabled:false,
                  popupTemplate:null,
                  renderer:{
                    type:"simple",
                    symbol:{
                      type:"simple-fill",
                      color:[0,0,0,0],
                      outline:{ color:[8,46,92,.65], width:.7 }
                    }
                  }
                });

                webmap.layers.addMany([skotselLayer, statusLayer, pinLayer, gpsLayer]);

                const view = new MapView({
                  container:"viewDiv",
                  map:webmap,
                  padding:{ top:120, bottom:72 },
                  constraints:{ snapToZoom:false },
                  popupEnabled:false
                });

                view.popupEnabled = false;
                try { view.popup.autoOpenEnabled = false; } catch(_) {}

                view.when(() => {
                  viewReady = true;

                  try {
                    webmap.allLayers.forEach(layer => {
                      try {
                        layer.popupEnabled = false;
                        layer.popupTemplate = null;
                      } catch(_) {}
                    });
                  } catch(_) {}

                  redrawTrack();
                  redrawPins();
                  updateStats();
                  showToast("Kartan är redo");
                });

                document.getElementById("gpsBtn").onclick = centerOnGpsOrStart;
                document.getElementById("trackBtn").onclick = toggleTrack;
                document.getElementById("pinBtn").onclick = togglePinMode;
                document.getElementById("pinGpsBtn").onclick = createPinAtGps;
                document.getElementById("reportBtn").onclick = openMenu;
                document.getElementById("menuBtn").onclick = openMenu;
                document.getElementById("closeMenu").onclick = closeMenu;
                document.getElementById("closeArea").onclick = () => document.getElementById("areaPanel").classList.remove("open");
                document.getElementById("closePin").onclick = closePinPanel;

                document.getElementById("shareReportBtn").onclick = shareReport;
                document.getElementById("clearTodayBtn").onclick = clearTodayRoute;
                document.getElementById("clearAllBtn").onclick = clearAllRoutes;

                document.getElementById("movePinCenterBtn").onclick = () => {
                  pendingPinGeometry = view.center.clone().toJSON();
                  updatePinCoordsText(pendingPinGeometry);
                  showToast("Nål flyttad till kartans mitt");
                };

                document.getElementById("movePinGpsBtn").onclick = () => {
                  if (!lastGpsPoint) {
                    showToast("Ingen GPS-position ännu");
                    return;
                  }

                  pendingPinGeometry = makeGpsGeometry(lastGpsPoint);
                  updatePinCoordsText(pendingPinGeometry);
                  showToast("Nål flyttad till GPS");
                };

                document.querySelectorAll("[data-status]").forEach(b => {
                  b.onclick = () => {
                    areaStatus = b.dataset.status;
                    markAreaStatus();
                  };
                });

                document.getElementById("saveAreaBtn").onclick = () => {
                  if (!selectedArea) return;

                  const a = selectedArea.attributes || {};
                  const id = a.OBJECTID || a.OBJECTID_1 || Date.now();

                  statuses[id] = {
                    id,
                    status:areaStatus,
                    worker:document.getElementById("worker").value,
                    comment:document.getElementById("comment").value,
                    savedAt:new Date().toISOString(),
                    subtyp:a.SUBTYP || "",
                    team:a.TEAM || a.Team || "",
                    distrikt:a.DISTRIKT || ""
                  };

                  localStorage.setItem(STORE_KEY, JSON.stringify(statuses));
                  updateStats();
                  showToast("Status sparad");
                };

                document.getElementById("savePinBtn").onclick = savePin;
                document.getElementById("deletePinBtn").onclick = deletePin;

                view.on("hold", e => {
                  if (!e || !e.mapPoint) return;
                  createPinAtPoint(e.mapPoint, "Långtryck på kartan");
                });

                view.on("click", async e => {
                  try { view.popup.close(); } catch(_) {}

                  if (addPinMode) {
                    createPinAtPoint(e.mapPoint, "Nål på vald plats");
                    setPinMode(false);
                    return;
                  }

                  const hit = await view.hitTest(e);

                  const pinHit = hit.results.find(r =>
                    r.graphic &&
                    r.graphic.attributes &&
                    r.graphic.attributes.__type === "pin"
                  );

                  if (pinHit) {
                    openPinPanelForExisting(pinHit.graphic.attributes.id);
                    return;
                  }

                  const areaHit = hit.results.find(r =>
                    r.graphic &&
                    r.graphic.layer === skotselLayer
                  );

                  if (areaHit) {
                    selectedArea = areaHit.graphic;
                    openAreaPanel(selectedArea);
                  }
                });

                window.mergeNativeTrack = function(nativeTrackText) {
                  try {
                    const nativeTrack = JSON.parse(nativeTrackText || "[]");
                    if (!Array.isArray(nativeTrack) || nativeTrack.length === 0) return;

                    const existing = new Set(track.map(p => String(p.time) + "_" + p.lat + "_" + p.lon));

                    nativeTrack.forEach(p => {
                      const normalized = {
                        lat:Number(p.lat),
                        lon:Number(p.lon),
                        accuracy:Number(p.accuracy || 0),
                        heading:p.heading === null || p.heading === undefined ? null : Number(p.heading),
                        time:typeof p.time === "number" ? new Date(p.time).toISOString() : p.time,
                        native:true
                      };

                      const key = String(normalized.time) + "_" + normalized.lat + "_" + normalized.lon;

                      if (
                        Number.isFinite(normalized.lat) &&
                        Number.isFinite(normalized.lon) &&
                        !existing.has(key)
                      ) {
                        track.push(normalized);
                        existing.add(key);
                      }
                    });

                    track.sort((a,b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                    localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                    if (viewReady) {
                      redrawTrack();
                      updateStats();
                    }
                  } catch(e) {
                    console.log("mergeNativeTrack error", e);
                  }
                };

                function createPinAtPoint(point, msg) {
                  if (!point) {
                    showToast("Kunde inte läsa plats");
                    return;
                  }

                  selectedPinId = null;
                  pendingPinGeometry = point.clone ? point.clone().toJSON() : point.toJSON();
                  openPinPanelForNew(pendingPinGeometry);
                  showToast(msg || "Nål skapad");
                }

                function createPinAtGps() {
                  if (!lastGpsPoint) {
                    showToast("Tryck Spåra/GPS först och vänta på position");
                    return;
                  }

                  selectedPinId = null;
                  pendingPinGeometry = makeGpsGeometry(lastGpsPoint);
                  openPinPanelForNew(pendingPinGeometry);
                  showToast("Nål vid GPS");
                }

                function makeGpsGeometry(p) {
                  return {
                    type:"point",
                    longitude:p.lon,
                    latitude:p.lat,
                    spatialReference:{ wkid:4326 }
                  };
                }

                function centerOnGpsOrStart() {
                  followGps = true;

                  if (!tracking) startTrack();

                  if (lastGpsPoint) {
                    view.goTo({
                      center:[lastGpsPoint.lon,lastGpsPoint.lat],
                      scale:view.scale || 900
                    }, { animate:true }).catch(()=>{});
                    showToast("Följer GPS");
                  } else {
                    showToast("Startar GPS… vänta på position");
                  }
                }

                function openAreaPanel(g) {
                  closePinPanel();
                  closeMenu();

                  const a = g.attributes || {};
                  const id = a.OBJECTID || a.OBJECTID_1;
                  const saved = statuses[id];

                  areaStatus = saved ? saved.status : "Ej klippt";

                  document.getElementById("areaTitle").textContent = label(a.SUBTYP);
                  document.getElementById("mId").textContent = id || "-";
                  document.getElementById("mType").textContent = a.SUBTYP || "-";
                  document.getElementById("mTeam").textContent = a.TEAM || a.Team || "-";
                  document.getElementById("mDistrict").textContent = a.DISTRIKT || "-";
                  document.getElementById("comment").value = saved ? saved.comment : "";

                  markAreaStatus();
                  document.getElementById("areaPanel").classList.add("open");
                }

                function markAreaStatus() {
                  document.querySelectorAll("[data-status]").forEach(b => {
                    b.classList.toggle("active", b.dataset.status === areaStatus);
                  });
                }

                function togglePinMode() {
                  setPinMode(!addPinMode);
                }

                function setPinMode(v) {
                  addPinMode = v;
                  document.getElementById("pinBtn").classList.toggle("danger", addPinMode);
                  document.getElementById("pinHint").classList.toggle("show", addPinMode);
                  document.getElementById("pinBtn").textContent = addPinMode ? "Avbryt" : "Nål";
                }

                function openPinPanelForNew(geom) {
                  document.getElementById("areaPanel").classList.remove("open");
                  closeMenu();

                  document.getElementById("pinTitle").textContent = "Ny nål";
                  document.getElementById("pinSub").textContent = "Spara avvikelse på vald plats";
                  updatePinCoordsText(geom);

                  document.getElementById("pinType").value = "Handjagare krävs";
                  document.getElementById("pinComment").value = "";
                  document.getElementById("pinStatus").value = "Öppen";
                  document.getElementById("deletePinBtn").classList.add("hidden");
                  document.getElementById("pinPanel").classList.add("open");
                }

                function openPinPanelForExisting(id) {
                  const p = pins.find(x => x.id === id);
                  if (!p) return;

                  selectedPinId = id;
                  pendingPinGeometry = p.geometry;

                  document.getElementById("areaPanel").classList.remove("open");
                  closeMenu();

                  document.getElementById("pinTitle").textContent = p.type || "Egen nål";
                  document.getElementById("pinSub").textContent = p.createdAt ? "Skapad: " + new Date(p.createdAt).toLocaleString("sv-SE") : "Sparad nål";
                  updatePinCoordsText(p.geometry);

                  document.getElementById("pinType").value = p.type || "Annat";
                  document.getElementById("pinComment").value = p.comment || "";
                  document.getElementById("pinStatus").value = p.status || "Öppen";
                  document.getElementById("deletePinBtn").classList.remove("hidden");
                  document.getElementById("pinPanel").classList.add("open");
                }

                function updatePinCoordsText(geom) {
                  if (!geom) return;

                  const x = geom.longitude ?? geom.x ?? "-";
                  const y = geom.latitude ?? geom.y ?? "-";

                  document.getElementById("pinX").textContent = typeof x === "number" ? x.toFixed(5) : x;
                  document.getElementById("pinY").textContent = typeof y === "number" ? y.toFixed(5) : y;
                }

                function savePin() {
                  if (!pendingPinGeometry) {
                    showToast("Ingen nålposition vald");
                    return;
                  }

                  const data = {
                    id:selectedPinId || ("pin_" + Date.now()),
                    geometry:pendingPinGeometry,
                    type:document.getElementById("pinType").value,
                    comment:document.getElementById("pinComment").value,
                    status:document.getElementById("pinStatus").value,
                    createdAt:selectedPinId ? (pins.find(x => x.id === selectedPinId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
                    updatedAt:new Date().toISOString()
                  };

                  const ix = pins.findIndex(x => x.id === data.id);

                  if (ix >= 0) pins[ix] = data;
                  else pins.push(data);

                  localStorage.setItem(PINS_KEY, JSON.stringify(pins));

                  selectedPinId = data.id;
                  redrawPins();
                  updateStats();
                  showToast("Nål sparad");
                  closePinPanel();
                }

                function deletePin() {
                  if (!selectedPinId) return;
                  if (!confirm("Ta bort denna nål?")) return;

                  pins = pins.filter(x => x.id !== selectedPinId);
                  localStorage.setItem(PINS_KEY, JSON.stringify(pins));
                  redrawPins();
                  updateStats();
                  showToast("Nål borttagen");
                  closePinPanel();
                }

                function closePinPanel() {
                  document.getElementById("pinPanel").classList.remove("open");
                  selectedPinId = null;
                  pendingPinGeometry = null;
                }

                function redrawPins() {
                  pinLayer.removeAll();

                  for (const p of pins) {
                    if (!p.geometry) continue;

                    pinLayer.add(new Graphic({
                      geometry:p.geometry,
                      attributes:Object.assign({}, p, { __type:"pin" }),
                      symbol:{
                        type:"simple-marker",
                        style:p.status === "Fixad" ? "diamond" : "circle",
                        color: pinColor(p.type, p.status),
                        size:32,
                        yoffset:10,
                        outline:{ color:[255,255,255,1], width:4 }
                      }
                    }));

                    pinLayer.add(new Graphic({
                      geometry:p.geometry,
                      attributes:Object.assign({}, p, { __type:"pin_label" }),
                      symbol:{
                        type:"text",
                        text:"!",
                        color:[255,255,255,1],
                        font:{ size:15, weight:"bold" },
                        yoffset:10
                      }
                    }));
                  }
                }

                function pinColor(type, status) {
                  if (status === "Fixad") return [34,197,94,1];
                  if (type === "Handjagare krävs") return [245,158,11,1];
                  if (type === "Går ej klippa") return [239,68,68,1];
                  if (type === "Hinder") return [168,85,247,1];
                  return [14,165,233,1];
                }

                function toggleTrack() {
                  tracking ? stopTrack() : startTrack();
                }

                function startTrack() {
                  if (!navigator.geolocation) {
                    showToast("GPS stöds inte");
                    return;
                  }

                  tracking = true;
                  followGps = true;

                  document.getElementById("trackBtn").classList.add("warn");
                  document.getElementById("trackBtn").textContent = "Stoppa";

                  try {
                    if (window.AndroidBridge && window.AndroidBridge.startBackgroundTracking) {
                      window.AndroidBridge.startBackgroundTracking();
                    }
                  } catch(e) {
                    console.log(e);
                  }

                  if (watchId === null) {
                    watchId = navigator.geolocation.watchPosition(onPos, err => {
                      showToast("GPS-fel: " + err.message);
                    }, {
                      enableHighAccuracy:true,
                      maximumAge:0,
                      timeout:8000
                    });
                  }

                  showToast("Spårning startad");
                }

                function stopTrack() {
                  tracking = false;
                  followGps = false;

                  if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                  }

                  watchId = null;

                  try {
                    if (window.AndroidBridge && window.AndroidBridge.stopBackgroundTracking) {
                      window.AndroidBridge.stopBackgroundTracking();
                    }
                  } catch(e) {
                    console.log(e);
                  }

                  document.getElementById("trackBtn").classList.remove("warn");
                  document.getElementById("trackBtn").textContent = "Spåra";
                  showToast("Spårning stoppad");
                }

                function onPos(pos) {
                  const c = pos.coords;

                  const p = {
                    lat:c.latitude,
                    lon:c.longitude,
                    accuracy:Math.round(c.accuracy || 0),
                    heading:Number.isFinite(c.heading) ? c.heading : null,
                    time:new Date(pos.timestamp || Date.now()).toISOString()
                  };

                  document.getElementById("gpsInfo").textContent = "±" + p.accuracy + " m";

                  if (p.accuracy <= BAD_ACCURACY) {
                    drawGps(p);
                    lastGpsPoint = p;
                  }

                  if (p.accuracy > GOOD_ACCURACY) {
                    showToast("GPS osäker ±" + p.accuracy + " m");
                    return;
                  }

                  const last = track[track.length - 1];

                  if (last) {
                    const d = distance(last.lat,last.lon,p.lat,p.lon);

                    if (d > IMPOSSIBLE_JUMP_METERS && p.accuracy > 20) {
                      showToast("GPS-hopp ignorerat");
                      return;
                    }

                    if (d < MIN_TRACK_DISTANCE_METERS) return;
                  }

                  if (!Number.isFinite(p.heading) && track.length) {
                    const prev = track[track.length - 1];
                    const d = distance(prev.lat, prev.lon, p.lat, p.lon);

                    if (d >= 2) {
                      p.heading = bearing(prev.lat, prev.lon, p.lat, p.lon);
                    }
                  }

                  track.push(p);
                  localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                  redrawTrack();
                  drawGps(p);
                  updateStats();

                  if (followGps) {
                    view.goTo({
                      center:[p.lon,p.lat],
                      scale:view.scale || 900
                    }, { animate:false }).catch(()=>{});
                  }
                }

                function drawGps(p) {
                  gpsLayer.removeAll();

                  const point = {
                    type:"point",
                    longitude:p.lon,
                    latitude:p.lat,
                    spatialReference:{ wkid:4326 }
                  };

                  const heading = getBestHeading(p);
                  const hasHeading = Number.isFinite(heading);

                  try {
                    const circle = geometryEngine.geodesicBuffer(point, Math.max(p.accuracy,5), "meters");

                    gpsLayer.add(new Graphic({
                      geometry:circle,
                      attributes:{ __type:"gpsAccuracy" },
                      symbol:{
                        type:"simple-fill",
                        color:[56,189,248,.05],
                        outline:{ color:[56,189,248,.22], width:1 }
                      }
                    }));
                  } catch(e) {}

                  gpsLayer.add(new Graphic({
                    geometry:point,
                    attributes:{ __type:"gps" },
                    symbol: hasHeading ? {
                      type:"simple-marker",
                      style:"triangle",
                      color:[56,189,248,1],
                      size:18,
                      angle:heading,
                      outline:{ color:[255,255,255,1], width:3 }
                    } : {
                      type:"simple-marker",
                      style:"circle",
                      color:[56,189,248,1],
                      size:18,
                      outline:{ color:[255,255,255,1], width:3 }
                    }
                  }));
                }

                function redrawTrack() {
                  if (lineGraphic) {
                    gpsLayer.remove(lineGraphic);
                    lineGraphic = null;
                  }

                  if (track.length < 2) {
                    updateStats();
                    return;
                  }

                  lineGraphic = new Graphic({
                    geometry:new Polyline({
                      paths:[track.map(p => [p.lon,p.lat])],
                      spatialReference:{ wkid:4326 }
                    }),
                    attributes:{ __type:"track" },
                    symbol:{
                      type:"simple-line",
                      color:[14,165,233,.95],
                      width:5,
                      cap:"round",
                      join:"round"
                    }
                  });

                  gpsLayer.add(lineGraphic);
                  updateStats();
                }

                function updateStats() {
                  const today = getTodayKey();
                  const todayPoints = track.filter(p => dayKey(p.time) === today);
                  const km = routeDistance(todayPoints) / 1000;
                  const mins = routeMinutes(todayPoints);

                  document.getElementById("todayKm").textContent = km.toFixed(2).replace(".", ",") + " km";
                  document.getElementById("pointCount").textContent = String(track.length);

                  document.getElementById("menuTodayKm").textContent = km.toFixed(2).replace(".", ",") + " km";
                  document.getElementById("menuTodayTime").textContent = mins + " min";
                  document.getElementById("menuPins").textContent = String(pins.length);
                  document.getElementById("menuStatuses").textContent = String(Object.keys(statuses).length);

                  renderDayList();
                }

                function renderDayList() {
                  const box = document.getElementById("dayList");
                  if (!box) return;

                  const days = {};

                  track.forEach(p => {
                    const k = dayKey(p.time);
                    if (!days[k]) days[k] = [];
                    days[k].push(p);
                  });

                  const keys = Object.keys(days).sort().reverse();
                  box.innerHTML = "";

                  keys.slice(0, 14).forEach(k => {
                    const pts = days[k];
                    const km = routeDistance(pts) / 1000;
                    const mins = routeMinutes(pts);

                    const div = document.createElement("div");
                    div.className = "listItem";
                    div.innerHTML =
                      "<b>" + k + "</b>" +
                      "<span>" + km.toFixed(2).replace(".", ",") + " km • " + mins + " min • " + pts.length + " punkter</span>";

                    box.appendChild(div);
                  });

                  if (!keys.length) {
                    box.innerHTML = '<div class="listItem"><b>Ingen rutt ännu</b><span>Starta spårning för att samla statistik.</span></div>';
                  }
                }

                function openMenu() {
                  closePinPanel();
                  document.getElementById("areaPanel").classList.remove("open");
                  updateStats();
                  document.getElementById("menuPanel").classList.add("open");
                }

                function closeMenu() {
                  document.getElementById("menuPanel").classList.remove("open");
                }

                function shareReport() {
                  const today = getTodayKey();
                  const todayPoints = track.filter(p => dayKey(p.time) === today);
                  const km = routeDistance(todayPoints) / 1000;
                  const mins = routeMinutes(todayPoints);

                  const openPins = pins.filter(p => p.status !== "Fixad");
                  const fixedPins = pins.filter(p => p.status === "Fixad");

                  const statusRows = Object.values(statuses)
                    .filter(s => dayKey(s.savedAt) === today);

                  let text = "";
                  text += "Skötselytor GPS - dagsrapport\n";
                  text += "Datum: " + today + "\n\n";
                  text += "Rutt: " + km.toFixed(2).replace(".", ",") + " km\n";
                  text += "Spårad tid: " + mins + " min\n";
                  text += "GPS-punkter: " + todayPoints.length + "\n\n";
                  text += "Nålar totalt: " + pins.length + "\n";
                  text += "Öppna nålar: " + openPins.length + "\n";
                  text += "Fixade nålar: " + fixedPins.length + "\n\n";
                  text += "Statusar sparade idag: " + statusRows.length + "\n";

                  if (statusRows.length) {
                    text += "\nYtor idag:\n";
                    statusRows.forEach(s => {
                      text += "- " + (s.subtyp || "Yta") + " / " + s.status + " / " + (s.comment || "ingen kommentar") + "\n";
                    });
                  }

                  if (pins.length) {
                    text += "\nNålar:\n";
                    pins.forEach(p => {
                      text += "- " + p.type + " / " + p.status + " / " + (p.comment || "ingen kommentar") + "\n";
                    });
                  }

                  try {
                    if (window.AndroidBridge && window.AndroidBridge.shareText) {
                      window.AndroidBridge.shareText("Skötselytor GPS rapport " + today, text);
                    } else {
                      alert(text);
                    }
                  } catch(e) {
                    alert(text);
                  }
                }

                function clearTodayRoute() {
                  const today = getTodayKey();

                  if (!confirm("Rensa dagens rutt? Nålar och statusar sparas.")) return;

                  track = track.filter(p => dayKey(p.time) !== today);
                  localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                  redrawTrack();
                  updateStats();
                  showToast("Dagens rutt rensad");
                }

                function clearAllRoutes() {
                  if (!confirm("Rensa ALLA rutter? Nålar och statusar sparas.")) return;

                  track = [];
                  localStorage.setItem(TRACK_KEY, JSON.stringify(track));

                  try {
                    if (window.AndroidBridge && window.AndroidBridge.clearNativeTrack) {
                      window.AndroidBridge.clearNativeTrack();
                    }
                  } catch(e) {}

                  redrawTrack();
                  updateStats();
                  showToast("Alla rutter rensade");
                }

                function getBestHeading(p) {
                  if (Number.isFinite(p.heading)) {
                    lastHeading = p.heading;
                    return p.heading;
                  }

                  if (track.length >= 2) {
                    const a = track[track.length - 2];
                    const b = track[track.length - 1];
                    const d = distance(a.lat, a.lon, b.lat, b.lon);

                    if (d >= 2) {
                      lastHeading = bearing(a.lat, a.lon, b.lat, b.lon);
                      return lastHeading;
                    }
                  }

                  return lastHeading;
                }

                function routeDistance(points) {
                  let total = 0;
                  for (let i = 1; i < points.length; i++) {
                    total += distance(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
                  }
                  return total;
                }

                function routeMinutes(points) {
                  if (points.length < 2) return 0;
                  const a = new Date(points[0].time).getTime();
                  const b = new Date(points[points.length - 1].time).getTime();
                  return Math.max(0, Math.round((b - a) / 60000));
                }

                function dayKey(t) {
                  const d = new Date(t);
                  const y = d.getFullYear();
                  const m = String(d.getMonth() + 1).padStart(2, "0");
                  const da = String(d.getDate()).padStart(2, "0");
                  return y + "-" + m + "-" + da;
                }

                function getTodayKey() {
                  return dayKey(new Date().toISOString());
                }

                function bearing(lat1, lon1, lat2, lon2) {
                  const r = d => d * Math.PI / 180;
                  const y = Math.sin(r(lon2-lon1)) * Math.cos(r(lat2));
                  const x = Math.cos(r(lat1))*Math.sin(r(lat2)) -
                            Math.sin(r(lat1))*Math.cos(r(lat2))*Math.cos(r(lon2-lon1));
                  return (Math.atan2(y,x) * 180 / Math.PI + 360) % 360;
                }

                function distance(lat1,lon1,lat2,lon2) {
                  const R = 6371000;
                  const r = d => d * Math.PI / 180;
                  const dLat = r(lat2-lat1);
                  const dLon = r(lon2-lon1);
                  const a =
                    Math.sin(dLat/2)**2 +
                    Math.cos(r(lat1)) *
                    Math.cos(r(lat2)) *
                    Math.sin(dLon/2)**2;

                  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                }

                function label(v) {
                  const m = {
                    bruksgrasmatta:"Bruksgräsmatta",
                    hogvuxen_grasyta_ang:"Högvuxen gräsyta/Äng",
                    bruksgrasmatta_robot:"Bruksgräsmatta med robot",
                    plantering:"Plantering",
                    naturmark:"Naturmark",
                    grasarmering:"Gräsarmering"
                  };

                  return m[v] || v || "Skötselyta";
                }

                let toastTimer;

                function showToast(t) {
                  const el = document.getElementById("toast");
                  el.textContent = t;
                  el.classList.add("show");
                  clearTimeout(toastTimer);
                  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-gps-apk
          path: app/build/outputs/apk/debug/app-debug.apk
