name: Build Skötselytor GPS CLEAN APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create Android WebView GPS Clean project
        run: |
          rm -rf app build.gradle settings.gradle

          mkdir -p app/src/main/java/se/skotselytor/gpssmooth
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'SkotselytorGpsClean'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'se.skotselytor.gpssmooth'
              compileSdk 35

              defaultConfig {
                  applicationId 'se.skotselytor.gpssmooth'
                  minSdk 26
                  targetSdk 35
                  versionCode 3
                  versionName 'GPS-CLEAN-1.2'
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Skötselytor GPS Clean</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:hardwareAccelerated">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor GPS Clean"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:allowBackup="false"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/gpssmooth/MainActivity.java <<'EOF'
          package se.skotselytor.gpssmooth;

          import android.Manifest;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Build;
          import android.content.pm.PackageManager;
          import android.view.Display;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.GeolocationPermissions;
          import android.webkit.ConsoleMessage;

          public class MainActivity extends Activity {
              private WebView webView;
              private static final int LOCATION_REQUEST = 1001;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );

                  preferHighestRefreshRate();

                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );

                  requestLocationPermissionIfNeeded();

                  webView = new WebView(this);
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setGeolocationEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.setWebViewClient(new WebViewClient());

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }

                      @Override
                      public boolean onConsoleMessage(ConsoleMessage consoleMessage) {
                          return true;
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              private void preferHighestRefreshRate() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      try {
                          Display display = getWindowManager().getDefaultDisplay();
                          Display.Mode[] modes = display.getSupportedModes();

                          float bestRefresh = 0f;
                          int bestModeId = 0;

                          for (Display.Mode mode : modes) {
                              if (mode.getRefreshRate() > bestRefresh) {
                                  bestRefresh = mode.getRefreshRate();
                                  bestModeId = mode.getModeId();
                              }
                          }

                          if (bestModeId != 0) {
                              WindowManager.LayoutParams attrs = getWindow().getAttributes();
                              attrs.preferredDisplayModeId = bestModeId;
                              getWindow().setAttributes(attrs);
                          }
                      } catch (Throwable ignored) {}
                  }
              }

              private void requestLocationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(
                              new String[]{
                                  Manifest.permission.ACCESS_FINE_LOCATION,
                                  Manifest.permission.ACCESS_COARSE_LOCATION
                              },
                              LOCATION_REQUEST
                          );
                      }
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          cat > app/src/main/assets/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
            <title>Skötselytor GPS Clean</title>

            <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
            <script src="https://js.arcgis.com/4.31/"></script>

            <style>
              html, body, #viewDiv {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                overflow: hidden;
                background: #eef1f4;
                font-family: Arial, sans-serif;
                touch-action: none;
              }

              #panel {
                position: absolute;
                top: 10px;
                left: 10px;
                z-index: 99;
                background: rgba(17, 24, 39, 0.86);
                color: white;
                padding: 8px 11px;
                border-radius: 15px;
                font-size: 13px;
                line-height: 1.25;
                box-shadow: 0 8px 22px rgba(0,0,0,0.26);
                pointer-events: none;
                max-width: 300px;
                backdrop-filter: blur(8px);
              }

              #panel .title {
                font-size: 15px;
                font-weight: 800;
                margin-bottom: 2px;
              }

              #buttons {
                position: absolute;
                right: 12px;
                bottom: 22px;
                z-index: 99;
                display: flex;
                flex-direction: column;
                gap: 9px;
              }

              button {
                border: 1px solid rgba(0,0,0,0.12);
                border-radius: 17px;
                min-width: 78px;
                height: 46px;
                padding: 0 13px;
                font-size: 14px;
                font-weight: 800;
                background: rgba(255,255,255,0.94);
                color: #111827;
                box-shadow: 0 7px 20px rgba(0,0,0,0.25);
              }

              button.active {
                background: #1a73e8;
                color: white;
                border-color: rgba(255,255,255,0.25);
              }

              .ok { color: #8cffab; font-weight: 800; }
              .bad { color: #ff8585; font-weight: 800; }
              .warn { color: #ffd166; font-weight: 800; }

              #gpsMarker {
                position: absolute;
                width: 42px;
                height: 42px;
                z-index: 120;
                pointer-events: none;
                display: none;
                left: 0;
                top: 0;
                transform-origin: center center;
                will-change: left, top, transform;
              }

              .coneOuter {
                position: absolute;
                left: 50%;
                top: 1px;
                width: 22px;
                height: 28px;
                transform: translateX(-50%);
                background: rgba(255,255,255,0.95);
                clip-path: polygon(50% 0%, 90% 100%, 10% 100%);
                opacity: 0;
                filter: drop-shadow(0 2px 4px rgba(0,0,0,0.20));
              }

              .coneInner {
                position: absolute;
                left: 50%;
                top: 5px;
                width: 15px;
                height: 22px;
                transform: translateX(-50%);
                background: rgba(26,115,232,0.33);
                clip-path: polygon(50% 0%, 90% 100%, 10% 100%);
                opacity: 0;
              }

              #gpsMarker.hasHeading .coneOuter,
              #gpsMarker.hasHeading .coneInner {
                opacity: 1;
              }

              #gpsDot {
                position: absolute;
                left: 50%;
                top: 50%;
                width: 12px;
                height: 12px;
                transform: translate(-50%, -50%);
                background: #1a73e8;
                border: 3px solid white;
                border-radius: 999px;
                box-shadow: 0 2px 7px rgba(0,0,0,0.35);
              }
            </style>
          </head>

          <body>
            <div id="viewDiv"></div>

            <div id="panel">
              <div class="title">Skötselytor GPS</div>
              <div id="mapStatus">Karta: laddar...</div>
              <div id="gpsStatus">GPS: väntar...</div>
              <div id="followStatus">Följ: låst</div>
            </div>

            <div id="buttons">
              <button id="followBtn" class="active">FÖLJ</button>
              <button id="centerBtn">MITT</button>
            </div>

            <div id="gpsMarker">
              <div class="coneOuter"></div>
              <div class="coneInner"></div>
              <div id="gpsDot"></div>
            </div>

            <script>
              const mapStatus = document.getElementById("mapStatus");
              const gpsStatus = document.getElementById("gpsStatus");
              const followStatus = document.getElementById("followStatus");
              const followBtn = document.getElementById("followBtn");
              const centerBtn = document.getElementById("centerBtn");
              const gpsMarker = document.getElementById("gpsMarker");

              let view;

              let accuracyGraphic;
              let trackHaloGraphic;
              let trackGraphic;

              let followGps = true;

              let lastRaw = null;
              let displayPos = null;
              let animFrom = null;
              let animTo = null;
              let animStart = 0;
              let animDuration = 850;

              let lastAccuracy = 0;
              let lastSpeed = 0;
              let lastHeadingDeg = 0;
              let hasHeading = false;
              let deviceHeadingDeg = null;

              let trackPoints = [];
              let cumulativeTrackMeters = 0;

              function setMapStatus(text, cls) {
                mapStatus.innerHTML = "Karta: <span class='" + (cls || "") + "'>" + text + "</span>";
              }

              function setGpsStatus(text, cls) {
                gpsStatus.innerHTML = "GPS: <span class='" + (cls || "") + "'>" + text + "</span>";
              }

              function updateFollowUi() {
                if (followGps) {
                  followBtn.textContent = "FÖLJ";
                  followBtn.classList.add("active");
                  followStatus.innerHTML = "Följ: <span class='ok'>låst</span>";
                } else {
                  followBtn.textContent = "FRI";
                  followBtn.classList.remove("active");
                  followStatus.innerHTML = "Följ: <span class='warn'>fri</span>";
                }
              }

              followBtn.onclick = function() {
                followGps = !followGps;
                updateFollowUi();
              };

              centerBtn.onclick = function() {
                if (displayPos && view) {
                  view.center = {
                    longitude: displayPos.lon,
                    latitude: displayPos.lat
                  };
                }
              };

              updateFollowUi();

              window.addEventListener("error", function(e) {
                setMapStatus("JavaScript-fel: " + e.message, "bad");
              });

              window.addEventListener("unhandledrejection", function(e) {
                setMapStatus("Laddningsfel: " + e.reason, "bad");
              });

              startCompass();

              require([
                "esri/config",
                "esri/WebMap",
                "esri/views/MapView",
                "esri/Graphic",
                "esri/geometry/Point",
                "esri/geometry/Circle",
                "esri/geometry/Polyline"
              ], function(esriConfig, WebMap, MapView, Graphic, Point, Circle, Polyline) {

                esriConfig.portalUrl = "https://kartor.linkoping.se/portal";

                const webmap = new WebMap({
                  portalItem: {
                    id: "4811ba982b9e4a97b01cf4353224374b"
                  }
                });

                view = new MapView({
                  container: "viewDiv",
                  map: webmap,
                  center: [15.6214, 58.4108],
                  zoom: 12,
                  constraints: {
                    rotationEnabled: true
                  },
                  ui: {
                    components: ["zoom", "attribution"]
                  }
                });

                view.when(function() {
                  setMapStatus("laddad ✅", "ok");
                  startGps(Graphic, Point, Circle, Polyline);
                  requestAnimationFrame(animationLoop);
                }).catch(function(error) {
                  setMapStatus("kunde inte laddas: " + error.message, "bad");
                });
              });

              function startGps(Graphic, Point, Circle, Polyline) {
                if (!navigator.geolocation) {
                  setGpsStatus("stöds inte i denna WebView", "bad");
                  return;
                }

                setGpsStatus("startar...", "warn");

                navigator.geolocation.watchPosition(function(pos) {
                  const lon = pos.coords.longitude;
                  const lat = pos.coords.latitude;
                  const acc = Math.round(pos.coords.accuracy || 0);
                  const speed = pos.coords.speed ? (pos.coords.speed * 3.6) : 0;
                  const gpsHeading = Number(pos.coords.heading);

                  lastAccuracy = acc;
                  lastSpeed = speed;

                  const next = { lon, lat };

                  if (!displayPos) {
                    displayPos = next;
                    animFrom = next;
                    animTo = next;
                  } else {
                    animFrom = { lon: displayPos.lon, lat: displayPos.lat };
                    animTo = next;
                    animStart = performance.now();

                    const dist = roughDistanceMeters(animFrom.lat, animFrom.lon, animTo.lat, animTo.lon);
                    animDuration = Math.max(500, Math.min(1100, dist * 80));
                  }

                  if (lastRaw) {
                    const distRaw = roughDistanceMeters(lastRaw.lat, lastRaw.lon, lat, lon);

                    if (distRaw >= 3 && distRaw < 80) {
                      cumulativeTrackMeters += distRaw;
                      trackPoints.push([lon, lat]);
                    }

                    let chosenHeading = null;

                    if (Number.isFinite(gpsHeading) && gpsHeading >= 0 && speed > 1.2) {
                      chosenHeading = gpsHeading;
                    } else if (speed <= 2.0 && deviceHeadingDeg !== null) {
                      chosenHeading = deviceHeadingDeg;
                    } else if (distRaw > 4) {
                      chosenHeading = bearingDegrees(lastRaw.lat, lastRaw.lon, lat, lon);
                    }

                    if (chosenHeading !== null) {
                      lastHeadingDeg = hasHeading ? smoothAngle(lastHeadingDeg, chosenHeading, 0.28) : chosenHeading;
                      hasHeading = true;
                    }
                  } else {
                    trackPoints.push([lon, lat]);

                    if (deviceHeadingDeg !== null) {
                      lastHeadingDeg = deviceHeadingDeg;
                      hasHeading = true;
                    }
                  }

                  lastRaw = next;

                  if (acc <= 30) {
                    setGpsStatus(acc + " m · " + speed.toFixed(1) + " km/h", "ok");
                  } else if (acc <= 80) {
                    setGpsStatus(acc + " m · " + speed.toFixed(1) + " km/h", "warn");
                  } else {
                    setGpsStatus("dålig precision · " + acc + " m", "bad");
                  }

                }, function(error) {
                  setGpsStatus(error.message, "bad");
                }, {
                  enableHighAccuracy: true,
                  maximumAge: 500,
                  timeout: 15000
                });

                window.__ArcGIS = { Graphic, Point, Circle, Polyline };
              }

              function animationLoop(now) {
                if (view && animTo && window.__ArcGIS) {
                  if (!displayPos) {
                    displayPos = animTo;
                  }

                  let t = 1;
                  if (animStart && animDuration > 0) {
                    t = Math.min(1, (now - animStart) / animDuration);
                  }

                  const eased = easeOutCubic(t);

                  displayPos = {
                    lon: lerp(animFrom.lon, animTo.lon, eased),
                    lat: lerp(animFrom.lat, animTo.lat, eased)
                  };

                  drawMapOverlays(displayPos.lon, displayPos.lat);
                  updateGpsDom(displayPos.lon, displayPos.lat);

                  if (followGps) {
                    view.center = {
                      longitude: displayPos.lon,
                      latitude: displayPos.lat
                    };
                  }
                }

                requestAnimationFrame(animationLoop);
              }

              function drawMapOverlays(lon, lat) {
                const Graphic = window.__ArcGIS.Graphic;
                const Point = window.__ArcGIS.Point;
                const Circle = window.__ArcGIS.Circle;
                const Polyline = window.__ArcGIS.Polyline;

                const point = new Point({
                  longitude: lon,
                  latitude: lat
                });

                const trackPath = getTrackPath(lon, lat);
                const showTrack = cumulativeTrackMeters >= 8 && trackPath.length >= 2;

                const haloSymbol = {
                  type: "simple-line",
                  color: showTrack ? [255, 255, 255, 0.82] : [255, 255, 255, 0],
                  width: showTrack ? 6 : 1,
                  cap: "round",
                  join: "round"
                };

                const trackSymbol = {
                  type: "simple-line",
                  color: showTrack ? [26, 115, 232, 0.98] : [26, 115, 232, 0],
                  width: showTrack ? 3 : 1,
                  cap: "round",
                  join: "round"
                };

                const accuracyRadius = Math.min(Math.max(3, lastAccuracy), 22);

                if (!accuracyGraphic) {
                  trackHaloGraphic = new Graphic({
                    geometry: new Polyline({
                      paths: [trackPath],
                      spatialReference: { wkid: 4326 }
                    }),
                    symbol: haloSymbol
                  });

                  trackGraphic = new Graphic({
                    geometry: new Polyline({
                      paths: [trackPath],
                      spatialReference: { wkid: 4326 }
                    }),
                    symbol: trackSymbol
                  });

                  accuracyGraphic = new Graphic({
                    geometry: new Circle({
                      center: point,
                      radius: accuracyRadius,
                      radiusUnit: "meters"
                    }),
                    symbol: {
                      type: "simple-fill",
                      color: [26, 115, 232, 0.07],
                      outline: {
                        color: [26, 115, 232, 0.24],
                        width: 1
                      }
                    }
                  });

                  view.graphics.addMany([
                    trackHaloGraphic,
                    trackGraphic,
                    accuracyGraphic
                  ]);
                } else {
                  const lineGeometry = new Polyline({
                    paths: [trackPath],
                    spatialReference: { wkid: 4326 }
                  });

                  trackHaloGraphic.geometry = lineGeometry;
                  trackHaloGraphic.symbol = haloSymbol;

                  trackGraphic.geometry = lineGeometry;
                  trackGraphic.symbol = trackSymbol;

                  accuracyGraphic.geometry = new Circle({
                    center: point,
                    radius: accuracyRadius,
                    radiusUnit: "meters"
                  });

                  try {
                    const n = view.graphics.length || 0;
                    view.graphics.reorder(trackHaloGraphic, Math.max(0, n - 3));
                    view.graphics.reorder(trackGraphic, Math.max(0, n - 2));
                    view.graphics.reorder(accuracyGraphic, Math.max(0, n - 1));
                  } catch(e) {}
                }
              }

              function updateGpsDom(lon, lat) {
                const Point = window.__ArcGIS.Point;

                const point = new Point({
                  longitude: lon,
                  latitude: lat
                });

                const screen = view.toScreen(point);

                if (!screen || !Number.isFinite(screen.x) || !Number.isFinite(screen.y)) {
                  gpsMarker.style.display = "none";
                  return;
                }

                gpsMarker.style.display = "block";
                gpsMarker.style.left = screen.x + "px";
                gpsMarker.style.top = screen.y + "px";

                if (hasHeading) {
                  gpsMarker.classList.add("hasHeading");
                } else {
                  gpsMarker.classList.remove("hasHeading");
                }

                const screenHeading = normalizeDeg(lastHeadingDeg - (view.rotation || 0));
                gpsMarker.style.transform = "translate(-50%, -50%) rotate(" + screenHeading + "deg)";
              }

              function getTrackPath(lon, lat) {
                if (trackPoints.length >= 2) {
                  return trackPoints.concat([[lon, lat]]);
                }

                if (trackPoints.length === 1) {
                  return [trackPoints[0], [lon, lat]];
                }

                return [[lon, lat], [lon, lat]];
              }

              function startCompass() {
                function handleOrientation(e) {
                  let heading = null;

                  if (typeof e.webkitCompassHeading === "number") {
                    heading = e.webkitCompassHeading;
                  } else if (e.absolute === true && typeof e.alpha === "number") {
                    heading = (360 - e.alpha) % 360;
                  }

                  if (heading !== null && Number.isFinite(heading)) {
                    deviceHeadingDeg = deviceHeadingDeg === null
                      ? heading
                      : smoothAngle(deviceHeadingDeg, heading, 0.18);

                    if (lastSpeed < 2.0) {
                      lastHeadingDeg = hasHeading
                        ? smoothAngle(lastHeadingDeg, deviceHeadingDeg, 0.18)
                        : deviceHeadingDeg;
                      hasHeading = true;
                    }
                  }
                }

                try {
                  window.addEventListener("deviceorientationabsolute", handleOrientation, true);
                  window.addEventListener("deviceorientation", handleOrientation, true);
                } catch(e) {}
              }

              function lerp(a, b, t) {
                return a + (b - a) * t;
              }

              function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
              }

              function normalizeDeg(deg) {
                return ((deg % 360) + 360) % 360;
              }

              function smoothAngle(from, to, amount) {
                const diff = ((to - from + 540) % 360) - 180;
                return normalizeDeg(from + diff * amount);
              }

              function roughDistanceMeters(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const toRad = x => x * Math.PI / 180;
                const dLat = toRad(lat2 - lat1);
                const dLon = toRad(lon2 - lon1);
                const a =
                  Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
              }

              function bearingDegrees(lat1, lon1, lat2, lon2) {
                const toRad = x => x * Math.PI / 180;
                const toDeg = x => x * 180 / Math.PI;

                const phi1 = toRad(lat1);
                const phi2 = toRad(lat2);
                const deltaLon = toRad(lon2 - lon1);

                const y = Math.sin(deltaLon) * Math.cos(phi2);
                const x =
                  Math.cos(phi1) * Math.sin(phi2) -
                  Math.sin(phi1) * Math.cos(phi2) * Math.cos(deltaLon);

                return normalizeDeg(toDeg(Math.atan2(y, x)));
              }
            </script>
          </body>
          </html>
          EOF

      - name: Build APK
        run: gradle assembleDebug

