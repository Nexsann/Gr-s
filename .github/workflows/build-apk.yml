name: Build Skötselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create safe Android project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/gpssafe
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          if [ -f ".github/workflows/skotselytorr.geojoson" ]; then
            cp ".github/workflows/skotselytorr.geojoson" app/src/main/assets/skotselytor.geojson
          elif [ -f ".github/workflows/skotselytor.geojson" ]; then
            cp ".github/workflows/skotselytor.geojson" app/src/main/assets/skotselytor.geojson
          elif [ -f ".github/workflows/query (1)" ]; then
            cp ".github/workflows/query (1)" app/src/main/assets/skotselytor.geojson
          else
            echo '{"type":"FeatureCollection","features":[]}' > app/src/main/assets/skotselytor.geojson
          fi

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "SkotselytorGPSSafe"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "se.skotselytor.gpssafe"
              compileSdk 35

              defaultConfig {
                  applicationId "se.skotselytor.gpssafe"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "3.1-safe"
              }
          }

          dependencies {
              implementation "org.osmdroid:osmdroid-android:6.1.20"
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#22c55e</item>
                  <item name="android:navigationBarColor">#020617</item>
                  <item name="android:statusBarColor">#020617</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor GPS Safe"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/gpssafe/MainActivity.java <<'EOF'
          package se.skotselytor.gpssafe;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.Context;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.preference.PreferenceManager;
          import android.view.Gravity;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import org.json.JSONArray;
          import org.json.JSONObject;
          import org.osmdroid.config.Configuration;
          import org.osmdroid.events.MapEventsReceiver;
          import org.osmdroid.tileprovider.tilesource.TileSourceFactory;
          import org.osmdroid.util.BoundingBox;
          import org.osmdroid.util.GeoPoint;
          import org.osmdroid.views.MapView;
          import org.osmdroid.views.overlay.FolderOverlay;
          import org.osmdroid.views.overlay.MapEventsOverlay;
          import org.osmdroid.views.overlay.Marker;
          import org.osmdroid.views.overlay.Polygon;
          import org.osmdroid.views.overlay.Polyline;

          import java.io.ByteArrayOutputStream;
          import java.io.InputStream;
          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends Activity implements LocationListener {
              private static final int REQ_LOCATION = 1001;

              private MapView map;
              private TextView statusText;
              private TextView gpsText;
              private TextView countText;
              private ProgressBar progress;

              private FolderOverlay surfaceOverlay;
              private FolderOverlay pinOverlay;
              private FolderOverlay gpsOverlay;

              private LocationManager locationManager;
              private Location lastLocation;
              private boolean followGps = false;
              private boolean surfacesLoaded = false;
              private boolean loadingSurfaces = false;

              private Marker gpsMarker;
              private Polyline routeLine;
              private final ArrayList<GeoPoint> routePoints = new ArrayList<>();

              private double minLat = 999;
              private double minLon = 999;
              private double maxLat = -999;
              private double maxLon = -999;

              static class SurfaceDef {
                  ArrayList<GeoPoint> points;
                  String title;
                  String message;
                  int fillColor;
                  int strokeColor;
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  hideSystemBars();

                  Configuration.getInstance().load(this, PreferenceManager.getDefaultSharedPreferences(this));
                  Configuration.getInstance().setUserAgentValue(getPackageName());

                  FrameLayout root = new FrameLayout(this);

                  map = new MapView(this);
                  map.setTileSource(TileSourceFactory.MAPNIK);
                  map.setMultiTouchControls(true);
                  map.setTilesScaledToDpi(true);
                  map.getController().setZoom(13.5);
                  map.getController().setCenter(new GeoPoint(58.4108, 15.6214));

                  root.addView(map, new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.MATCH_PARENT
                  ));

                  surfaceOverlay = new FolderOverlay();
                  pinOverlay = new FolderOverlay();
                  gpsOverlay = new FolderOverlay();

                  map.getOverlays().add(surfaceOverlay);
                  map.getOverlays().add(pinOverlay);
                  map.getOverlays().add(gpsOverlay);

                  MapEventsOverlay events = new MapEventsOverlay(new MapEventsReceiver() {
                      @Override
                      public boolean singleTapConfirmedHelper(GeoPoint p) {
                          return false;
                      }

                      @Override
                      public boolean longPressHelper(GeoPoint p) {
                          addPin(p);
                          return true;
                      }
                  });

                  map.getOverlays().add(events);

                  LinearLayout top = new LinearLayout(this);
                  top.setOrientation(LinearLayout.VERTICAL);
                  top.setPadding(16, 28, 16, 12);
                  top.setBackgroundColor(Color.argb(238, 2, 6, 23));

                  TextView title = new TextView(this);
                  title.setText("Skötselytor GPS Safe");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(18);
                  title.setTypeface(null, 1);

                  statusText = new TextView(this);
                  statusText.setText("Säker start klar. Tryck Ladda ytor när kartan syns.");
                  statusText.setTextColor(Color.rgb(203, 213, 225));
                  statusText.setTextSize(12);

                  progress = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progress.setMax(100);
                  progress.setProgress(0);
                  progress.setVisibility(View.GONE);

                  LinearLayout buttons1 = new LinearLayout(this);
                  buttons1.setOrientation(LinearLayout.HORIZONTAL);
                  buttons1.setPadding(0, 10, 0, 0);

                  Button loadBtn = makeButton("Ladda ytor");
                  Button gpsBtn = makeButton("GPS");
                  Button pinBtn = makeButton("Nål här");

                  buttons1.addView(loadBtn);
                  buttons1.addView(gpsBtn);
                  buttons1.addView(pinBtn);

                  LinearLayout buttons2 = new LinearLayout(this);
                  buttons2.setOrientation(LinearLayout.HORIZONTAL);
                  buttons2.setPadding(0, 6, 0, 0);

                  Button allBtn = makeButton("Visa allt");
                  Button clearPinsBtn = makeButton("Rensa nålar");
                  Button clearRouteBtn = makeButton("Rensa rutt");

                  buttons2.addView(allBtn);
                  buttons2.addView(clearPinsBtn);
                  buttons2.addView(clearRouteBtn);

                  LinearLayout stats = new LinearLayout(this);
                  stats.setOrientation(LinearLayout.HORIZONTAL);
                  stats.setPadding(0, 8, 0, 0);

                  gpsText = smallBox("GPS: av");
                  countText = smallBox("Ytor: ej laddade");

                  stats.addView(gpsText);
                  stats.addView(countText);

                  top.addView(title);
                  top.addView(statusText);
                  top.addView(progress);
                  top.addView(buttons1);
                  top.addView(buttons2);
                  top.addView(stats);

                  FrameLayout.LayoutParams topParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.WRAP_CONTENT
                  );

                  topParams.gravity = Gravity.TOP;
                  root.addView(top, topParams);

                  setContentView(root);

                  loadBtn.setOnClickListener(v -> loadSkotselytorSafe());

                  gpsBtn.setOnClickListener(v -> {
                      followGps = true;
                      startGps();
                      if (lastLocation != null) {
                          GeoPoint p = new GeoPoint(lastLocation.getLatitude(), lastLocation.getLongitude());
                          map.getController().animateTo(p);
                          map.getController().setZoom(Math.max(map.getZoomLevelDouble(), 18.0));
                      }
                  });

                  pinBtn.setOnClickListener(v -> {
                      if (lastLocation == null) {
                          toast("Ingen GPS ännu. Tryck GPS först.");
                          startGps();
                          return;
                      }

                      addPin(new GeoPoint(lastLocation.getLatitude(), lastLocation.getLongitude()));
                  });

                  allBtn.setOnClickListener(v -> zoomToAll());

                  clearPinsBtn.setOnClickListener(v -> {
                      pinOverlay.getItems().clear();
                      map.invalidate();
                      toast("Nålar rensade");
                  });

                  clearRouteBtn.setOnClickListener(v -> {
                      routePoints.clear();
                      if (routeLine != null) {
                          gpsOverlay.remove(routeLine);
                          routeLine = null;
                      }
                      map.invalidate();
                      toast("Rutt rensad");
                  });
              }

              private Button makeButton(String text) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setTextSize(12);
                  b.setAllCaps(false);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1);
                  lp.setMargins(4, 0, 4, 0);
                  b.setLayoutParams(lp);
                  return b;
              }

              private TextView smallBox(String text) {
                  TextView t = new TextView(this);
                  t.setText(text);
                  t.setTextColor(Color.WHITE);
                  t.setTextSize(12);
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(10, 8, 10, 8);
                  t.setBackgroundColor(Color.argb(120, 15, 23, 42));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1);
                  lp.setMargins(4, 0, 4, 0);
                  t.setLayoutParams(lp);
                  return t;
              }

              private void hideSystemBars() {
                  if (Build.VERSION.SDK_INT >= 30) {
                      WindowInsetsController c = getWindow().getInsetsController();
                      if (c != null) {
                          c.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          c.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  }

                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }

              private void loadSkotselytorSafe() {
                  if (surfacesLoaded) {
                      toast("Ytor är redan laddade");
                      return;
                  }

                  if (loadingSurfaces) {
                      toast("Laddar redan");
                      return;
                  }

                  loadingSurfaces = true;
                  progress.setVisibility(View.VISIBLE);
                  progress.setProgress(2);
                  statusText.setText("Läser offlinefil i bakgrunden...");

                  new Thread(() -> {
                      ArrayList<SurfaceDef> surfaces = new ArrayList<>();

                      try {
                          String json = readAsset("skotselytor.geojson");
                          JSONObject root = new JSONObject(json);
                          JSONArray features = root.optJSONArray("features");

                          if (features == null) {
                              throw new Exception("GeoJSON saknar features");
                          }

                          int total = features.length();

                          for (int i = 0; i < total; i++) {
                              JSONObject f = features.optJSONObject(i);
                              if (f == null) continue;

                              JSONObject props = f.optJSONObject("properties");
                              JSONObject geom = f.optJSONObject("geometry");
                              if (geom == null) continue;

                              String type = geom.optString("type", "");
                              JSONArray coordinates = geom.optJSONArray("coordinates");
                              if (coordinates == null) continue;

                              if ("Polygon".equalsIgnoreCase(type)) {
                                  SurfaceDef s = parseRing(coordinates.optJSONArray(0), props);
                                  if (s != null) surfaces.add(s);
                              } else if ("MultiPolygon".equalsIgnoreCase(type)) {
                                  for (int m = 0; m < coordinates.length(); m++) {
                                      JSONArray poly = coordinates.optJSONArray(m);
                                      if (poly == null) continue;

                                      SurfaceDef s = parseRing(poly.optJSONArray(0), props);
                                      if (s != null) surfaces.add(s);
                                  }
                              }

                              if (i % 50 == 0) {
                                  int pct = Math.min(90, Math.max(3, (int)((i * 90.0) / Math.max(1, total))));
                                  int done = i;
                                  runOnUiThread(() -> {
                                      progress.setProgress(pct);
                                      statusText.setText("Tolkar ytor: " + done + " / " + total);
                                  });
                              }
                          }

                          runOnUiThread(() -> addSurfacesInBatches(surfaces));

                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              loadingSurfaces = false;
                              progress.setVisibility(View.GONE);
                              statusText.setText("Kunde inte läsa offlinefilen");
                              toast("Fel vid laddning av ytor");
                          });
                      }
                  }).start();
              }

              private SurfaceDef parseRing(JSONArray ring, JSONObject props) {
                  try {
                      if (ring == null || ring.length() < 3) return null;

                      int len = ring.length();
                      int step = 1;

                      if (len > 1500) step = 16;
                      else if (len > 1000) step = 12;
                      else if (len > 600) step = 8;
                      else if (len > 300) step = 4;
                      else if (len > 150) step = 2;

                      ArrayList<GeoPoint> pts = new ArrayList<>();

                      for (int i = 0; i < len; i += step) {
                          JSONArray c = ring.optJSONArray(i);
                          if (c == null || c.length() < 2) continue;

                          double lon = c.optDouble(0);
                          double lat = c.optDouble(1);

                          if (lat < 55 || lat > 70 || lon < 10 || lon > 25) continue;

                          pts.add(new GeoPoint(lat, lon));

                          minLat = Math.min(minLat, lat);
                          minLon = Math.min(minLon, lon);
                          maxLat = Math.max(maxLat, lat);
                          maxLon = Math.max(maxLon, lon);
                      }

                      if (pts.size() < 3) return null;

                      SurfaceDef s = new SurfaceDef();
                      s.points = pts;
                      s.title = getTitle(props);
                      s.message = getMessage(props);
                      s.fillColor = fillColor(props);
                      s.strokeColor = Color.argb(185, 8, 46, 92);

                      return s;
                  } catch (Exception e) {
                      return null;
                  }
              }

              private void addSurfacesInBatches(ArrayList<SurfaceDef> surfaces) {
                  surfaceOverlay.getItems().clear();

                  final int total = surfaces.size();
                  final int batchSize = 35;

                  statusText.setText("Ritar ytor: 0 / " + total);
                  progress.setProgress(92);

                  addBatch(surfaces, 0, batchSize, total);
              }

              private void addBatch(ArrayList<SurfaceDef> surfaces, int start, int batchSize, int total) {
                  int end = Math.min(start + batchSize, total);

                  for (int i = start; i < end; i++) {
                      SurfaceDef def = surfaces.get(i);

                      Polygon p = new Polygon(map);
                      p.setPoints(def.points);
                      p.setStrokeWidth(1.1f);
                      p.setStrokeColor(def.strokeColor);
                      p.setFillColor(def.fillColor);
                      p.setInfoWindow(null);

                      p.setOnClickListener((poly, mapView, eventPos) -> {
                          new AlertDialog.Builder(this)
                              .setTitle(def.title)
                              .setMessage(def.message)
                              .setPositiveButton("OK", null)
                              .show();
                          return true;
                      });

                      surfaceOverlay.add(p);
                  }

                  countText.setText("Ytor: " + end + " / " + total);
                  progress.setProgress(92 + (int)((end * 8.0) / Math.max(1, total)));
                  map.invalidate();

                  if (end < total) {
                      map.postDelayed(() -> addBatch(surfaces, end, batchSize, total), 40);
                  } else {
                      surfacesLoaded = true;
                      loadingSurfaces = false;
                      progress.setVisibility(View.GONE);
                      statusText.setText("Offline-data laddad: " + total + " ytor");
                      toast("Ytor laddade");
                      zoomToAll();
                  }
              }

              private String getTitle(JSONObject p) {
                  if (p == null) return "Skötselyta";

                  String sub = p.optString("SUBTYP", "");
                  if (sub == null || sub.trim().isEmpty()) {
                      sub = p.optString("TYP", "");
                  }

                  if (sub == null || sub.trim().isEmpty()) return "Skötselyta";

                  return sub;
              }

              private String getMessage(JSONObject p) {
                  if (p == null) return "Ingen info";

                  StringBuilder sb = new StringBuilder();

                  append(sb, "OBJECTID", p.optString("OBJECTID", ""));
                  append(sb, "TYP", p.optString("TYP", ""));
                  append(sb, "SUBTYP", p.optString("SUBTYP", ""));
                  append(sb, "DISTRIKT", p.optString("DISTRIKT", ""));
                  append(sb, "FÖRVALTAROMRÅDE", p.optString("FORVALTAROMRADE", ""));
                  append(sb, "FASTIGHET", p.optString("FASTIGHET", ""));
                  append(sb, "TEAM", p.optString("TEAM", ""));
                  append(sb, "AREA", p.optString("Shape__Area", ""));

                  String result = sb.toString().trim();
                  return result.isEmpty() ? "Ingen extra info" : result;
              }

              private void append(StringBuilder sb, String k, String v) {
                  if (v == null) return;
                  String clean = v.trim();
                  if (clean.isEmpty() || "null".equalsIgnoreCase(clean)) return;
                  sb.append(k).append(": ").append(clean).append("\n");
              }

              private int fillColor(JSONObject props) {
                  String sub = "";

                  if (props != null) {
                      sub = props.optString("SUBTYP", props.optString("TYP", "")).toLowerCase();
                  }

                  if (sub.contains("bruks")) return Color.argb(88, 34, 197, 94);
                  if (sub.contains("äng") || sub.contains("ang") || sub.contains("hög")) return Color.argb(82, 234, 179, 8);
                  if (sub.contains("plantering")) return Color.argb(78, 168, 85, 247);
                  if (sub.contains("gräs")) return Color.argb(86, 34, 197, 94);

                  return Color.argb(60, 56, 189, 248);
              }

              private void zoomToAll() {
                  if (minLat < 90 && minLon < 90 && maxLat > -90 && maxLon > -90) {
                      BoundingBox box = new BoundingBox(maxLat, maxLon, minLat, minLon);

                      map.postDelayed(() -> {
                          try {
                              map.zoomToBoundingBox(box, true, 90);
                          } catch (Exception e) {
                              toast("Kunde inte zooma ut");
                          }
                      }, 250);
                  } else {
                      toast("Inga ytor laddade ännu");
                  }
              }

              private void startGps() {
                  if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED &&
                          checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION
                          }, REQ_LOCATION);
                          return;
                      }
                  }

                  try {
                      locationManager = (LocationManager) getSystemService(Context.LOCATION_SERVICE);

                      if (locationManager != null) {
                          locationManager.removeUpdates(this);
                          locationManager.requestLocationUpdates(LocationManager.GPS_PROVIDER, 1800, 2.0f, this);
                          locationManager.requestLocationUpdates(LocationManager.NETWORK_PROVIDER, 3000, 4.0f, this);
                          gpsText.setText("GPS: startad");
                          toast("GPS startad");
                      }
                  } catch (Exception e) {
                      gpsText.setText("GPS: fel");
                      toast("Kunde inte starta GPS");
                  }
              }

              @Override
              public void onLocationChanged(Location loc) {
                  if (loc == null) return;

                  float acc = loc.hasAccuracy() ? loc.getAccuracy() : 999f;
                  gpsText.setText("GPS: ±" + Math.round(acc) + " m");

                  if (acc > 90) return;

                  if (lastLocation != null) {
                      float d = lastLocation.distanceTo(loc);

                      if (d < 2.0f) return;
                      if (d > 150f && acc > 30f) return;
                  }

                  lastLocation = loc;

                  GeoPoint p = new GeoPoint(loc.getLatitude(), loc.getLongitude());

                  drawGps(p);
                  addRoutePoint(p);

                  if (followGps) {
                      map.getController().animateTo(p);
                  }
              }

              private void drawGps(GeoPoint p) {
                  if (gpsMarker == null) {
                      gpsMarker = new Marker(map);
                      gpsMarker.setAnchor(Marker.ANCHOR_CENTER, Marker.ANCHOR_CENTER);
                      gpsMarker.setTitle("Min position");
                      gpsOverlay.add(gpsMarker);
                  }

                  gpsMarker.setPosition(p);
                  map.invalidate();
              }

              private void addRoutePoint(GeoPoint p) {
                  routePoints.add(p);

                  while (routePoints.size() > 8000) {
                      routePoints.remove(0);
                  }

                  if (routeLine == null) {
                      routeLine = new Polyline(map);
                      routeLine.setColor(Color.rgb(14, 165, 233));
                      routeLine.setWidth(6f);
                      gpsOverlay.add(routeLine);
                  }

                  routeLine.setPoints(routePoints);
                  map.invalidate();
              }

              private void addPin(GeoPoint p) {
                  Marker m = new Marker(map);
                  m.setPosition(p);
                  m.setAnchor(Marker.ANCHOR_CENTER, Marker.ANCHOR_BOTTOM);
                  m.setTitle("Handjagare krävs");
                  m.setSnippet("Nål skapad");

                  m.setOnMarkerClickListener((marker, mapView) -> {
                      new AlertDialog.Builder(this)
                          .setTitle(marker.getTitle())
                          .setMessage(
                              marker.getSnippet() +
                              "\n\nLat: " + marker.getPosition().getLatitude() +
                              "\nLon: " + marker.getPosition().getLongitude()
                          )
                          .setNegativeButton("Stäng", null)
                          .setPositiveButton("Ta bort", (d, w) -> {
                              pinOverlay.remove(marker);
                              map.invalidate();
                              toast("Nål borttagen");
                          })
                          .show();

                      return true;
                  });

                  pinOverlay.add(m);
                  map.invalidate();
                  toast("Nål sparad");
              }

              private String readAsset(String name) throws Exception {
                  InputStream is = getAssets().open(name);
                  ByteArrayOutputStream bos = new ByteArrayOutputStream();
                  byte[] buffer = new byte[16384];
                  int read;

                  while ((read = is.read(buffer)) != -1) {
                      bos.write(buffer, 0, read);
                  }

                  is.close();
                  return bos.toString("UTF-8");
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);

                  if (requestCode == REQ_LOCATION) {
                      boolean ok = false;

                      for (int r : grantResults) {
                          if (r == PackageManager.PERMISSION_GRANTED) {
                              ok = true;
                              break;
                          }
                      }

                      if (ok) {
                          startGps();
                      } else {
                          gpsText.setText("GPS: nekad");
                          toast("GPS nekad");
                      }
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  hideSystemBars();

                  if (map != null) {
                      map.onResume();
                  }
              }

              @Override
              protected void onPause() {
                  if (map != null) {
                      map.onPause();
                  }

                  super.onPause();
              }

              @Override
              protected void onDestroy() {
                  try {
                      if (locationManager != null) {
                          locationManager.removeUpdates(this);
                      }
                  } catch (Exception ignored) {}

                  super.onDestroy();
              }

              @Override public void onProviderEnabled(String provider) {}
              @Override public void onProviderDisabled(String provider) {}
              @Override public void onStatusChanged(String provider, int status, Bundle extras) {}

              private void toast(String text) {
                  Toast.makeText(this, text, Toast.LENGTH_SHORT).show();
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-gps-safe-apk
          path: app/build/outputs/apk/debug/app-debug.apk
