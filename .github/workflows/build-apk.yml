name: Build Skotselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create Android project
        run: |
          rm -rf app build.gradle settings.gradle

          mkdir -p app/src/main/java/se/skotselytor/gps
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'SkotselytorGps'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'se.skotselytor.gps'
              compileSdk 35

              defaultConfig {
                  applicationId 'se.skotselytor.gps'
                  minSdk 26
                  targetSdk 35
                  versionCode 17
                  versionName 'GPS-FOLLOW-TRACKUP-1.16-BG-SAME-FILTER'
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Skötselytor GPS</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:hardwareAccelerated">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor GPS"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:allowBackup="false"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".BackgroundLocationService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/gps/MainActivity.java <<'EOF'
          package se.skotselytor.gps;

          import android.Manifest;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Build;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.hardware.Sensor;
          import android.hardware.SensorEvent;
          import android.hardware.SensorEventListener;
          import android.hardware.SensorManager;
          import android.view.Display;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.ConsoleMessage;
          import android.webkit.GeolocationPermissions;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity implements SensorEventListener {
              private WebView webView;
              private static final int LOCATION_REQUEST = 1001;
              private static final int NOTIFICATION_REQUEST = 1002;

              private SensorManager sensorManager;
              private Sensor rotationVectorSensor;
              private Sensor accelSensor;
              private Sensor magnetSensor;

              private final float[] accelValues = new float[3];
              private final float[] magnetValues = new float[3];
              private boolean hasAccel = false;
              private boolean hasMagnet = false;

              private volatile double headingDeg = -1.0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );

                  preferHighestRefreshRate();

                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );

                  sensorManager = (SensorManager) getSystemService(SENSOR_SERVICE);
                  if (sensorManager != null) {
                      rotationVectorSensor = sensorManager.getDefaultSensor(Sensor.TYPE_ROTATION_VECTOR);
                      accelSensor = sensorManager.getDefaultSensor(Sensor.TYPE_ACCELEROMETER);
                      magnetSensor = sensorManager.getDefaultSensor(Sensor.TYPE_MAGNETIC_FIELD);
                  }

                  requestLocationPermissionIfNeeded();
                  requestNotificationPermissionIfNeeded();

                  webView = new WebView(this);
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setGeolocationEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.addJavascriptInterface(new SensorBridge(), "AndroidSensors");
                  webView.addJavascriptInterface(new AndroidBridge(), "AndroidBridge");

                  webView.setWebViewClient(new WebViewClient());

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }

                      @Override
                      public boolean onConsoleMessage(ConsoleMessage consoleMessage) {
                          return true;
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  if (sensorManager != null) {
                      if (rotationVectorSensor != null) {
                          sensorManager.registerListener(this, rotationVectorSensor, SensorManager.SENSOR_DELAY_GAME);
                      }
                      if (accelSensor != null) {
                          sensorManager.registerListener(this, accelSensor, SensorManager.SENSOR_DELAY_GAME);
                      }
                      if (magnetSensor != null) {
                          sensorManager.registerListener(this, magnetSensor, SensorManager.SENSOR_DELAY_GAME);
                      }
                  }
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  if (sensorManager != null) {
                      sensorManager.unregisterListener(this);
                  }
              }

              @Override
              public void onSensorChanged(SensorEvent event) {
                  try {
                      if (event.sensor.getType() == Sensor.TYPE_ROTATION_VECTOR) {
                          float[] rotationMatrix = new float[9];
                          float[] orientation = new float[3];

                          SensorManager.getRotationMatrixFromVector(rotationMatrix, event.values);
                          SensorManager.getOrientation(rotationMatrix, orientation);

                          double deg = Math.toDegrees(orientation[0]);
                          headingDeg = normalizeDeg(deg);
                          return;
                      }

                      if (event.sensor.getType() == Sensor.TYPE_ACCELEROMETER) {
                          System.arraycopy(event.values, 0, accelValues, 0, 3);
                          hasAccel = true;
                      }

                      if (event.sensor.getType() == Sensor.TYPE_MAGNETIC_FIELD) {
                          System.arraycopy(event.values, 0, magnetValues, 0, 3);
                          hasMagnet = true;
                      }

                      if (hasAccel && hasMagnet) {
                          float[] rotationMatrix = new float[9];
                          float[] inclinationMatrix = new float[9];

                          boolean success = SensorManager.getRotationMatrix(
                              rotationMatrix,
                              inclinationMatrix,
                              accelValues,
                              magnetValues
                          );

                          if (success) {
                              float[] orientation = new float[3];
                              SensorManager.getOrientation(rotationMatrix, orientation);

                              double deg = Math.toDegrees(orientation[0]);
                              headingDeg = normalizeDeg(deg);
                          }
                      }
                  } catch (Throwable ignored) {}
              }

              @Override
              public void onAccuracyChanged(Sensor sensor, int accuracy) {}

              private double normalizeDeg(double deg) {
                  double d = deg % 360.0;
                  if (d < 0) d += 360.0;
                  return d;
              }

              public class SensorBridge {
                  @JavascriptInterface
                  public double getHeading() {
                      return headingDeg;
                  }
              }

              public class AndroidBridge {
                  @JavascriptInterface
                  public void startBackgroundTracking() {
                      try {
                          Intent intent = new Intent(MainActivity.this, BackgroundLocationService.class);
                          intent.setAction("START");
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              startForegroundService(intent);
                          } else {
                              startService(intent);
                          }
                      } catch (Throwable ignored) {}
                  }

                  @JavascriptInterface
                  public void stopBackgroundTracking() {
                      try {
                          Intent intent = new Intent(MainActivity.this, BackgroundLocationService.class);
                          intent.setAction("STOP");
                          startService(intent);
                      } catch (Throwable ignored) {}
                  }

                  @JavascriptInterface
                  public boolean isBackgroundTracking() {
                      try {
                          SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                          return prefs.getBoolean("background_tracking", false);
                      } catch (Throwable ignored) {
                          return false;
                      }
                  }

                  @JavascriptInterface
                  public String getNativeTrack() {
                      try {
                          SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                          return prefs.getString("native_track", "[]");
                      } catch (Throwable ignored) {
                          return "[]";
                      }
                  }

                  @JavascriptInterface
                  public void clearNativeTrack() {
                      try {
                          SharedPreferences prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                          prefs.edit().putString("native_track", "[]").apply();
                      } catch (Throwable ignored) {}
                  }
              }

              private void requestLocationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(
                              new String[] {
                                  Manifest.permission.ACCESS_FINE_LOCATION,
                                  Manifest.permission.ACCESS_COARSE_LOCATION
                              },
                              LOCATION_REQUEST
                          );
                      }
                  }
              }

              private void requestNotificationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= 33) {
                      try {
                          if (checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                              requestPermissions(
                                  new String[] { Manifest.permission.POST_NOTIFICATIONS },
                                  NOTIFICATION_REQUEST
                              );
                          }
                      } catch (Throwable ignored) {}
                  }
              }

              private void preferHighestRefreshRate() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      try {
                          Display display = getWindowManager().getDefaultDisplay();
                          Display.Mode[] modes = display.getSupportedModes();

                          float bestRefresh = 0f;
                          int bestModeId = 0;

                          for (Display.Mode mode : modes) {
                              if (mode.getRefreshRate() > bestRefresh) {
                                  bestRefresh = mode.getRefreshRate();
                                  bestModeId = mode.getModeId();
                              }
                          }

                          if (bestModeId != 0) {
                              WindowManager.LayoutParams attrs = getWindow().getAttributes();
                              attrs.preferredDisplayModeId = bestModeId;
                              getWindow().setAttributes(attrs);
                          }
                      } catch (Throwable ignored) {}
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          cat > app/src/main/java/se/skotselytor/gps/BackgroundLocationService.java <<'EOF'
          package se.skotselytor.gps;

          import android.Manifest;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.IBinder;
          import android.os.PowerManager;

          import org.json.JSONArray;

          public class BackgroundLocationService extends Service implements LocationListener {
              private static final String CHANNEL_ID = "skotselytor_gps_tracking";
              private static final int NOTIFICATION_ID = 2401;

              private static final float MAX_ACCURACY_METERS = 45f;
              private static final float HARD_MAX_ACCURACY_METERS = 80f;
              private static final float MIN_DISTANCE_METERS = 2.5f;
              private static final float MAX_JUMP_METERS = 80f;
              private static final float STILL_SPEED_MPS = 0.45f;

              private LocationManager locationManager;
              private PowerManager.WakeLock wakeLock;
              private SharedPreferences prefs;

              private Location lastAcceptedLocation = null;
              private Location lastSavedLocation = null;

              @Override
              public void onCreate() {
                  super.onCreate();

                  prefs = getSharedPreferences("skotselytor_native", MODE_PRIVATE);
                  locationManager = (LocationManager) getSystemService(LOCATION_SERVICE);

                  try {
                      PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
                      if (pm != null) {
                          wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "SkotselytorGPS:TrackingWakeLock");
                          wakeLock.setReferenceCounted(false);
                      }
                  } catch (Throwable ignored) {}
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  String action = intent != null ? intent.getAction() : "START";

                  if ("STOP".equals(action)) {
                      stopTracking();
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  startTracking();
                  return START_STICKY;
              }

              private void startTracking() {
                  try {
                      createNotificationChannel();
                      startForeground(NOTIFICATION_ID, buildNotification());

                      prefs.edit().putBoolean("background_tracking", true).apply();

                      if (wakeLock != null && !wakeLock.isHeld()) {
                          wakeLock.acquire();
                      }

                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED &&
                              checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                              return;
                          }
                      }

                      if (locationManager != null) {
                          try {
                              locationManager.requestLocationUpdates(
                                  LocationManager.GPS_PROVIDER,
                                  2500,
                                  2.5f,
                                  this
                              );
                          } catch (Throwable ignored) {}

                          try {
                              locationManager.requestLocationUpdates(
                                  LocationManager.NETWORK_PROVIDER,
                                  5000,
                                  5.0f,
                                  this
                              );
                          } catch (Throwable ignored) {}
                      }
                  } catch (Throwable ignored) {}
              }

              private void stopTracking() {
                  try {
                      prefs.edit().putBoolean("background_tracking", false).apply();

                      if (locationManager != null) {
                          locationManager.removeUpdates(this);
                      }

                      if (wakeLock != null && wakeLock.isHeld()) {
                          wakeLock.release();
                      }

                      stopForeground(true);
                  } catch (Throwable ignored) {}
              }

              @Override
              public void onDestroy() {
                  stopTracking();
                  super.onDestroy();
              }

              @Override
              public void onLocationChanged(Location location) {
                  if (location == null) return;

                  try {
                      if (location.hasAccuracy() && location.getAccuracy() > HARD_MAX_ACCURACY_METERS) {
                          return;
                      }

                      if (!isBetterOrUseful(location)) {
                          return;
                      }

                      if (lastAcceptedLocation != null) {
                          float jump = lastAcceptedLocation.distanceTo(location);

                          if (jump > MAX_JUMP_METERS) {
                              lastAcceptedLocation = location;
                              lastSavedLocation = location;
                              saveLocation(location, true);
                              return;
                          }

                          if (jump < MIN_DISTANCE_METERS) {
                              return;
                          }

                          if (looksLikeStandingStillDrift(location, jump)) {
                              return;
                          }

                          if (looksLikeBadSideJump(location, jump)) {
                              return;
                          }
                      }

                      lastAcceptedLocation = location;
                      lastSavedLocation = location;
                      saveLocation(location, false);

                  } catch (Throwable ignored) {}
              }

              private boolean isBetterOrUseful(Location location) {
                  if (!location.hasAccuracy()) return false;

                  float acc = location.getAccuracy();

                  if (acc <= MAX_ACCURACY_METERS) return true;

                  if (lastAcceptedLocation == null) return acc <= HARD_MAX_ACCURACY_METERS;

                  if (lastAcceptedLocation.hasAccuracy()) {
                      return acc <= lastAcceptedLocation.getAccuracy() + 10f;
                  }

                  return false;
              }

              private boolean looksLikeStandingStillDrift(Location location, float distance) {
                  try {
                      boolean slow = !location.hasSpeed() || location.getSpeed() < STILL_SPEED_MPS;
                      boolean lowDistance = distance < 6.0f;
                      boolean accuracyBiggerThanMove = location.hasAccuracy() && location.getAccuracy() > distance * 2.2f;

                      return slow && lowDistance && accuracyBiggerThanMove;
                  } catch (Throwable ignored) {
                      return false;
                  }
              }

              private boolean looksLikeBadSideJump(Location location, float distance) {
                  try {
                      if (lastAcceptedLocation == null) return false;
                      if (!location.hasAccuracy()) return false;

                      float acc = location.getAccuracy();

                      if (distance < 12f) return false;

                      boolean slow = !location.hasSpeed() || location.getSpeed() < 1.2f;
                      boolean poorComparedToMove = acc > 25f && acc > distance * 0.75f;

                      return slow && poorComparedToMove;
                  } catch (Throwable ignored) {
                      return false;
                  }
              }

              private void saveLocation(Location location, boolean breakLine) {
                  try {
                      String raw = prefs.getString("native_track", "[]");
                      JSONArray arr;

                      try {
                          arr = new JSONArray(raw);
                      } catch (Throwable e) {
                          arr = new JSONArray();
                      }

                      JSONArray point = new JSONArray();
                      point.put(location.getLongitude());
                      point.put(location.getLatitude());
                      point.put(location.hasAccuracy() ? location.getAccuracy() : 0);
                      point.put(location.getTime());
                      point.put(breakLine ? 1 : 0);

                      arr.put(point);

                      int max = 25000;
                      if (arr.length() > max) {
                          JSONArray trimmed = new JSONArray();
                          for (int i = arr.length() - max; i < arr.length(); i++) {
                              trimmed.put(arr.get(i));
                          }
                          arr = trimmed;
                      }

                      prefs.edit().putString("native_track", arr.toString()).apply();
                  } catch (Throwable ignored) {}
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "Skötselytor GPS-spårning",
                          NotificationManager.IMPORTANCE_LOW
                      );

                      channel.setDescription("Visar när Skötselytor GPS spårar i bakgrunden.");

                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }
              }

              private Notification buildNotification() {
                  Intent openIntent = new Intent(this, MainActivity.class);
                  openIntent.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);

                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this,
                      0,
                      openIntent,
                      Build.VERSION.SDK_INT >= Build.VERSION_CODES.M
                          ? PendingIntent.FLAG_IMMUTABLE
                          : 0
                  );

                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                      ? new Notification.Builder(this, CHANNEL_ID)
                      : new Notification.Builder(this);

                  builder
                      .setContentTitle("Skötselytor GPS spårar")
                      .setContentText("GPS-snöret sparas i bakgrunden.")
                      .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                      .setContentIntent(pendingIntent)
                      .setOngoing(true);

                  return builder.build();
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              @Override
              public void onStatusChanged(String provider, int status, Bundle extras) {}

              @Override
              public void onProviderEnabled(String provider) {}

              @Override
              public void onProviderDisabled(String provider) {}
          }
          EOF

          cat > app/src/main/assets/index.html <<'EOF'
