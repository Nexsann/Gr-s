name: Build Skötselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create WebView test project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/webviewtest
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "SkotselytorWebViewTest"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "se.skotselytor.webviewtest"
              compileSdk 35

              defaultConfig {
                  applicationId "se.skotselytor.webviewtest"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "0.2-webviewtest"
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#22c55e</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor WebViewtest"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/webviewtest/MainActivity.java <<'EOF'
          package se.skotselytor.webviewtest;

          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
          }
          EOF

          cat > app/src/main/assets/index.html <<'EOF'
          <!doctype html>
          <html lang="sv">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <title>WebView Test</title>
            <style>
              html, body {
                margin:0;
                height:100%;
                background:#020617;
                color:white;
                font-family:system-ui, sans-serif;
              }

              .wrap {
                min-height:100%;
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                padding:32px;
                text-align:center;
              }

              h1 {
                font-size:28px;
                margin:0 0 16px;
              }

              p {
                color:#cbd5e1;
                font-size:17px;
                line-height:1.5;
              }

              button {
                margin-top:22px;
                border:0;
                border-radius:16px;
                padding:14px 20px;
                background:#22c55e;
                color:#052e16;
                font-weight:900;
                font-size:16px;
              }

              #result {
                margin-top:18px;
                color:#86efac;
                font-weight:800;
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>Skötselytor WebViewtest</h1>
              <p>Om du ser detta fungerar WebView i appen.</p>
              <button onclick="document.getElementById('result').textContent='JavaScript fungerar också ✅'">
                Testa JavaScript
              </button>
              <div id="result"></div>
            </div>
          </body>
          </html>
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-webviewtest-apk
          path: app/build/outputs/apk/debug/app-debug.apk
