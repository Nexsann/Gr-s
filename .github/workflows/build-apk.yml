              .title span { display:block; font-size:11px; opacity:.85; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

              button { border:0; border-radius:999px; padding:10px 11px; font-weight:850; font-size:12px; cursor:pointer; }
              .btn { background:rgba(255,255,255,.16); color:white; }
              .primary { background:#22c55e; color:#052e16; }
              .warn { background:#f59e0b !important; color:#451a03 !important; }
              .danger { background:#ef4444 !important; color:white !important; }

              .stats {
                position:fixed;
                top:calc(72px + env(safe-area-inset-top));
                left:8px;
                right:8px;
                z-index:900;
                display:grid;
