                overflow:hidden;
                text-overflow:ellipsis;
              }

              .stat span {
                display:block;
                font-size:14px;
                font-weight:900;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
              }

              .bottomBar {
                position:fixed;
