          <!doctype html>
          <html lang="sv">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
            <title>Skötselytor GPS</title>
            <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
            <script src="https://js.arcgis.com/4.31/"></script>
            <style>
              html, body, #viewDiv {
                margin:0;
                padding:0;
                height:100%;
                width:100%;
                overflow:hidden;
                font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:#0b1220;
              }

              .topbar {
                position:fixed;
                top:0;
                left:0;
                right:0;
                z-index:20;
                display:flex;
                gap:6px;
                align-items:center;
                padding:10px;
                background:linear-gradient(90deg,#082e5c,#004851);
                color:white;
                box-shadow:0 8px 20px rgba(0,0,0,.25);
              }

              .title {
                flex:1;
                min-width:0;
                line-height:1.05;
              }

              .title b {
                display:block;
                font-size:15px;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
              }

              .title span {
                display:block;
                font-size:11px;
                opacity:.85;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
              }

              button {
                border:0;
                border-radius:999px;
                padding:10px 11px;
                font-weight:800;
                font-size:12px;
                cursor:pointer;
              }

