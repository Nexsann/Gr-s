name: Build Skotselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Create Android project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/gps app/src/main/assets app/src/main/res/values
          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='SkotselytorGPS'
          include ':app'
          EOF
          cat > build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.7.3' apply false }
          EOF
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'se.skotselytor.gps'; compileSdk 35
            defaultConfig { applicationId 'se.skotselytor.gps'; minSdk 26; targetSdk 35; versionCode 2; versionName '1.1' }
          }
          EOF
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"><item name="android:windowNoTitle">true</item><item name="android:statusBarColor">#082e5c</item><item name="android:navigationBarColor">#0b1220</item></style></resources>
          EOF
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/><uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application android:theme="@style/AppTheme" android:label="Skötselytor GPS" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
              <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
            </application>
          </manifest>
          EOF
          cat > app/src/main/java/se/skotselytor/gps/MainActivity.java <<'EOF'
          package se.skotselytor.gps;
          import android.Manifest;import android.annotation.SuppressLint;import android.app.Activity;import android.content.pm.PackageManager;import android.os.Bundle;import android.webkit.*;
          public class MainActivity extends Activity{private static final int R=1001;private WebView w;private GeolocationPermissions.Callback cb;private String origin;
          @SuppressLint("SetJavaScriptEnabled") public void onCreate(Bundle b){super.onCreate(b); if(checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION)!=PackageManager.PERMISSION_GRANTED)requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION,Manifest.permission.ACCESS_COARSE_LOCATION},R); w=new WebView(this);setContentView(w);WebSettings s=w.getSettings();s.setJavaScriptEnabled(true);s.setDomStorageEnabled(true);s.setDatabaseEnabled(true);s.setGeolocationEnabled(true);s.setAllowFileAccess(true);s.setAllowContentAccess(true);s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);w.setWebViewClient(new WebViewClient());w.setWebChromeClient(new WebChromeClient(){public void onGeolocationPermissionsShowPrompt(String o,GeolocationPermissions.Callback c){origin=o;cb=c;boolean g=checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION)==PackageManager.PERMISSION_GRANTED||checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION)==PackageManager.PERMISSION_GRANTED;if(g)c.invoke(o,true,false);else requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION,Manifest.permission.ACCESS_COARSE_LOCATION},R);}});w.loadUrl("file:///android_asset/index.html");}
          public void onRequestPermissionsResult(int r,String[] p,int[] gr){super.onRequestPermissionsResult(r,p,gr);if(r==R){boolean g=false;for(int x:gr)if(x==PackageManager.PERMISSION_GRANTED)g=true;if(cb!=null&&origin!=null){cb.invoke(origin,g,false);cb=null;origin=null;}}}
          public void onBackPressed(){if(w!=null&&w.canGoBack())w.goBack();else super.onBackPressed();}}
          EOF
          cat > app/src/main/assets/index.html <<'EOF'
          <!doctype html><html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Skötselytor GPS</title><link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css"><script src="https://js.arcgis.com/4.31/"></script><style>
          html,body,#viewDiv{margin:0;padding:0;height:100%;width:100%;overflow:hidden;font-family:system-ui;background:#0b1220}.top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;gap:6px;align-items:center;padding:10px;background:linear-gradient(90deg,#082e5c,#004851);color:white;box-shadow:0 8px 20px #0005}.title{flex:1;min-width:0}.title b{display:block;font-size:16px}.title span{display:block;font-size:11px;opacity:.85}button{border:0;border-radius:999px;padding:10px 12px;font-weight:800;font-size:13px}.btn{background:#ffffff29;color:white}.gps{background:#22c55e;color:#052e16}.activePin{background:#ef4444!important;color:white!important}.tracking{background:#f59e0b!important;color:#451a03!important}.legend{position:fixed;top:76px;right:8px;z-index:18;background:#fffffff0;color:#0f172a;border-radius:16px;padding:9px 11px;box-shadow:0 10px 28px #0003;font-size:12px;line-height:1.65}.panel{position:fixed;left:8px;right:8px;bottom:8px;z-index:30;background:white;border-radius:18px;box-shadow:0 14px 36px #0007;display:none;overflow:hidden;max-height:58vh}.panel.open{display:block}.head{padding:13px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between}.head h2{margin:0;font-size:17px}.head small{display:block;color:#64748b}.body{padding:13px;overflow:auto;max-height:calc(58vh - 62px)}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.meta div{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:8px;min-width:0}.meta b{display:block;font-size:10px;color:#64748b}.meta span{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:11px;margin-top:8px;font:inherit;background:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.grid button.sel{outline:3px solid #0f172a}.save{width:100%;margin-top:10px;background:#082e5c;color:white;border-radius:13px}.del{width:100%;margin-top:8px;background:#fee2e2;color:#7f1d1d;border-radius:13px}.hide{display:none!important}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:80;background:#020617;color:white;border-radius:999px;padding:11px 16px;font-weight:800;opacity:0;transition:.2s;white-space:nowrap}.toast.show{opacity:1}.hint{position:fixed;left:50%;top:86px;transform:translateX(-50%);z-index:70;background:#ef4444;color:white;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:900;box-shadow:0 10px 25px #0005;display:none}.hint.show{display:block}
          </style></head><body><div id="viewDiv"></div><div class="top"><div class="title"><b>Skötselytor GPS</b><span>GPS, spårning, status och nålar</span></div><button class="btn" id="pinBtn">Nål</button><button class="btn" id="trackBtn">Spåra</button><button class="gps" id="gpsBtn">GPS</button></div><div class="hint" id="hint">Tryck på kartan där nålen ska sitta</div><div class="legend"><div id="gpsInfo">GPS: ej aktiv</div><hr><div>📍 Egna nålar</div><div>⚪ Ej klippt</div><div>🟠 Pågår</div><div>🟢 Klippt</div><div>🔴 Problem</div></div>
          <div class="panel" id="areaPanel"><div class="head"><div><h2 id="areaTitle">Vald yta</h2><small>Klippstatus</small></div><button id="closeArea">×</button></div><div class="body"><div class="meta"><div><b>ID</b><span id="mId">-</span></div><div><b>Typ</b><span id="mType">-</span></div><div><b>Team</b><span id="mTeam">-</span></div><div><b>Distrikt</b><span id="mDistrict">-</span></div></div><input id="worker" placeholder="Ditt namn"><div class="grid"><button data-status="Ej klippt">Ej klippt</button><button data-status="Pågår">Pågår</button><button data-status="Klippt">Klippt</button><button data-status="Problem">Problem</button></div><textarea id="comment" rows="3" placeholder="Kommentar"></textarea><button class="save" id="saveArea">Spara status</button></div></div>
          <div class="panel" id="pinPanel"><div class="head"><div><h2 id="pinTitle">Egen nål</h2><small id="pinSub">Kommentar på kartan</small></div><button id="closePin">×</button></div><div class="body"><div class="meta"><div><b>Lat</b><span id="pinLat">-</span></div><div><b>Lon</b><span id="pinLon">-</span></div></div><select id="pinType"><option>Handjagare krävs</option><option>Hinder</option><option>Går ej klippa</option><option>Behöver kollas</option><option>Annat</option></select><textarea id="pinComment" rows="4" placeholder="Kommentar, t.ex. Handjagare krävs runt stolpar"></textarea><select id="pinStatus"><option>Öppen</option><option>Fixad</option></select><button class="save" id="savePin">Spara nål</button><button class="del hide" id="deletePin">Ta bort nål</button></div></div><div class="toast" id="toast">Sparat</div>
          <script>require(["esri/config","esri/WebMap","esri/views/MapView","esri/layers/FeatureLayer","esri/layers/GraphicsLayer","esri/widgets/Locate","esri/Graphic","esri/geometry/Polyline","esri/geometry/geometryEngine"],function(esriConfig,WebMap,MapView,FeatureLayer,GraphicsLayer,Locate,Graphic,Polyline,geometryEngine){esriConfig.portalUrl="https://kartor.linkoping.se/portal";const WEBMAP_ID="4811ba982b9e4a97b01cf4353224374b",LAYER_URL="https://kartor.linkoping.se/arcgis/rest/services/sts_omradeskarta/sts_skotselkartan_l/MapServer/32",STORE="skotselytor_status_v1",TRACK="skotselytor_track_v1",PINS="skotselytor_pins_v1";let selectedArea=null,selectedPinId=null,pendingPinPoint=null,areaStatus="Ej klippt",watchId=null,tracking=false,addPinMode=false,gpsGraphic=null,accGraphic=null,lineGraphic=null;const statuses=JSON.parse(localStorage.getItem(STORE)||"{}");let track=JSON.parse(localStorage.getItem(TRACK)||"[]"),pins=JSON.parse(localStorage.getItem(PINS)||"[]");const statusLayer=new GraphicsLayer({title:"Klippstatus"}),gpsLayer=new GraphicsLayer({title:"GPS-spår"}),pinsLayer=new GraphicsLayer({title:"Egna nålar"});const webmap=new WebMap({portalItem:{id:WEBMAP_ID,portal:{url:"https://kartor.linkoping.se/portal"}}});const skotselLayer=new FeatureLayer({url:LAYER_URL,outFields:["*"],opacity:.18,popupEnabled:false,renderer:{type:"simple",symbol:{type:"simple-fill",color:[0,0,0,0],outline:{color:[8,46,92,.7],width:.7}}}});webmap.layers.addMany([skotselLayer,statusLayer,pinsLayer,gpsLayer]);const view=new MapView({container:"viewDiv",map:webmap,padding:{top:70},constraints:{snapToZoom:false}});const locate=new Locate({view,useHeadingEnabled:true,goToOverride:(v,o)=>{o.target.scale=900;return v.goTo(o.target)}});view.ui.add(locate,"bottom-left");view.when(()=>{redrawTrack();redrawPins();toast("Kartan är redo")});document.getElementById("gpsBtn").onclick=()=>locate.locate();document.getElementById("trackBtn").onclick=()=>tracking?stopTrack():startTrack();document.getElementById("pinBtn").onclick=()=>setPinMode(!addPinMode);document.getElementById("closeArea").onclick=()=>areaPanel.classList.remove("open");document.getElementById("closePin").onclick=closePinPanel;document.querySelectorAll("[data-status]").forEach(b=>b.onclick=()=>{areaStatus=b.dataset.status;markAreaStatus()});document.getElementById("saveArea").onclick=()=>{if(!selectedArea)return;const a=selectedArea.attributes||{},id=a.OBJECTID;statuses[id]={id,status:areaStatus,worker:worker.value,comment:comment.value,savedAt:new Date().toISOString(),subtyp:a.SUBTYP||"",team:a.TEAM||a.Team||"",distrikt:a.DISTRIKT||""};localStorage.setItem(STORE,JSON.stringify(statuses));toast("Status sparad")};document.getElementById("savePin").onclick=savePin;document.getElementById("deletePin").onclick=deletePin;view.on("click",async e=>{if(addPinMode){pendingPinPoint=e.mapPoint.clone();selectedPinId=null;openPinNew(pendingPinPoint);setPinMode(false);return}const hit=await view.hitTest(e);const ph=hit.results.find(r=>r.graphic&&r.graphic.layer===pinsLayer);if(ph){openPinExisting(ph.graphic.attributes.id);return}const ah=hit.results.find(r=>r.graphic&&r.graphic.layer===skotselLayer);if(ah){selectedArea=ah.graphic;openArea(selectedArea)}});function openArea(g){pinPanel.classList.remove("open");const a=g.attributes||{},id=a.OBJECTID,s=statuses[id];areaStatus=s?s.status:"Ej klippt";areaTitle.textContent=label(a.SUBTYP);mId.textContent=id||"-";mType.textContent=a.SUBTYP||"-";mTeam.textContent=a.TEAM||a.Team||"-";mDistrict.textContent=a.DISTRIKT||"-";comment.value=s?s.comment:"";markAreaStatus();areaPanel.classList.add("open")}function markAreaStatus(){document.querySelectorAll("[data-status]").forEach(b=>b.classList.toggle("sel",b.dataset.status===areaStatus))}function setPinMode(v){addPinMode=v;pinBtn.classList.toggle("activePin",v);hint.classList.toggle("show",v);pinBtn.textContent=v?"Avbryt":"Nål"}function openPinNew(p){areaPanel.classList.remove("open");pinTitle.textContent="Ny nål";pinSub.textContent="Spara kommentar på vald plats";pinLat.textContent=p.latitude?p.latitude.toFixed(6):"-";pinLon.textContent=p.longitude?p.longitude.toFixed(6):"-";pinType.value="Handjagare krävs";pinComment.value="";pinStatus.value="Öppen";deletePin.classList.add("hide");pinPanel.classList.add("open")}function openPinExisting(id){const p=pins.find(x=>x.id===id);if(!p)return;selectedPinId=id;pendingPinPoint={type:"point",longitude:p.lon,latitude:p.lat,spatialReference:{wkid:4326}};areaPanel.classList.remove("open");pinTitle.textContent=p.type||"Egen nål";pinSub.textContent=p.createdAt?"Skapad: "+new Date(p.createdAt).toLocaleString("sv-SE"):"Sparad nål";pinLat.textContent=Number(p.lat).toFixed(6);pinLon.textContent=Number(p.lon).toFixed(6);pinType.value=p.type||"Annat";pinComment.value=p.comment||"";pinStatus.value=p.status||"Öppen";deletePin.classList.remove("hide");pinPanel.classList.add("open")}function savePin(){if(!pendingPinPoint)return;const data={id:selectedPinId||("pin_"+Date.now()),lat:pendingPinPoint.latitude,lon:pendingPinPoint.longitude,type:pinType.value,comment:pinComment.value,status:pinStatus.value,createdAt:selectedPinId?(pins.find(x=>x.id===selectedPinId)?.createdAt||new Date().toISOString()):new Date().toISOString(),updatedAt:new Date().toISOString()};const ix=pins.findIndex(x=>x.id===data.id);if(ix>=0)pins[ix]=data;else pins.push(data);localStorage.setItem(PINS,JSON.stringify(pins));redrawPins();toast("Nål sparad");closePinPanel()}function deletePin(){if(!selectedPinId)return;if(!confirm("Ta bort denna nål?"))return;pins=pins.filter(x=>x.id!==selectedPinId);localStorage.setItem(PINS,JSON.stringify(pins));redrawPins();toast("Nål borttagen");closePinPanel()}function closePinPanel(){pinPanel.classList.remove("open");selectedPinId=null;pendingPinPoint=null}function redrawPins(){pinsLayer.removeAll();for(const p of pins)pinsLayer.add(new Graphic({geometry:{type:"point",longitude:p.lon,latitude:p.lat,spatialReference:{wkid:4326}},attributes:p,symbol:{type:"simple-marker",style:p.status==="Fixad"?"diamond":"circle",color:pinColor(p.type,p.status),size:18,outline:{color:[255,255,255,1],width:2}}}))}function pinColor(t,s){if(s==="Fixad")return[34,197,94,.95];if(t==="Handjagare krävs")return[245,158,11,.95];if(t==="Går ej klippa")return[239,68,68,.95];if(t==="Hinder")return[168,85,247,.95];return[14,165,233,.95]}function startTrack(){if(!navigator.geolocation){toast("GPS stöds inte");return}tracking=true;trackBtn.classList.add("tracking");trackBtn.textContent="Stoppa";watchId=navigator.geolocation.watchPosition(onPos,e=>{toast("GPS-fel: "+e.message);stopTrack()},{enableHighAccuracy:true,maximumAge:1000,timeout:15000});toast("Spårning startad")}function stopTrack(){tracking=false;if(watchId!==null)navigator.geolocation.clearWatch(watchId);watchId=null;trackBtn.classList.remove("tracking");trackBtn.textContent="Spåra";toast("Spårning stoppad")}function onPos(pos){const c=pos.coords,p={lat:c.latitude,lon:c.longitude,accuracy:Math.round(c.accuracy||0),time:new Date(pos.timestamp||Date.now()).toISOString()},last=track[track.length-1];if(!last||dist(last.lat,last.lon,p.lat,p.lon)>2){track.push(p);localStorage.setItem(TRACK,JSON.stringify(track))}drawGps(p);redrawTrack();gpsInfo.textContent="GPS: ±"+p.accuracy+" m";if(tracking)view.goTo({center:[p.lon,p.lat],scale:900},{animate:false}).catch(()=>{})}function drawGps(p){if(gpsGraphic)gpsLayer.remove(gpsGraphic);if(accGraphic)gpsLayer.remove(accGraphic);const point={type:"point",longitude:p.lon,latitude:p.lat,spatialReference:{wkid:4326}};gpsGraphic=new Graphic({geometry:point,symbol:{type:"simple-marker",style:"circle",color:[56,189,248,1],size:16,outline:{color:[255,255,255,1],width:3}}});try{const circle=geometryEngine.geodesicBuffer(gpsGraphic.geometry,Math.max(p.accuracy,5),"meters");accGraphic=new Graphic({geometry:circle,symbol:{type:"simple-fill",color:[56,189,248,.12],outline:{color:[56,189,248,.45],width:1.5}}});gpsLayer.add(accGraphic)}catch(e){}gpsLayer.add(gpsGraphic)}function redrawTrack(){if(lineGraphic)gpsLayer.remove(lineGraphic);if(track.length<2)return;lineGraphic=new Graphic({geometry:new Polyline({paths:[track.map(p=>[p.lon,p.lat])],spatialReference:{wkid:4326}}),symbol:{type:"simple-line",color:[14,165,233,.9],width:4}});gpsLayer.add(lineGraphic)}function dist(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180,A=r(c-a),B=r(d-b),q=Math.sin(A/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(B/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}function label(v){return({bruksgrasmatta:"Bruksgräsmatta",hogvuxen_grasyta_ang:"Högvuxen gräsyta/Äng",bruksgrasmatta_robot:"Bruksgräsmatta med robot",plantering:"Plantering",naturmark:"Naturmark",grasarmering:"Gräsarmering"})[v]||v||"Skötselyta"}let tt;function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),2200)}});</script></body></html>
          EOF
      - name: Build APK
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-gps-apk
          path: app/build/outputs/apk/debug/app-debug.apk
